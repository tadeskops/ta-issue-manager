    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Addressal - The Address</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1f2e;
            --accent: #d4af37;
            --light: #f5f7fa;
            --border: #2a3142;
        }
        
        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #ffffff;
        }
        
        .premium-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .gold-accent {
            color: #d4af37;
        }
        
        .gold-border {
            border-color: rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950">
    <!-- Navigation -->
    <nav class="border-b gold-border sticky top-0 z-40 backdrop-blur-lg bg-slate-900/80">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <!-- Logo -->
                <div class="flex items-center gap-4">
                    <!-- Logo Only Version (Compact) -->
                    <img src="assets/images/TaLogo.png" alt="The Address" class="h-12 w-12 drop-shadow-lg">
                    <!-- Alternative: Logo with Text (Uncomment to use) -->
                    <!-- <div><img src="assets/images/TaLogoName.png" alt="The Address" class="h-10 drop-shadow-lg"></div> -->
                    <div>
                        <h1 class="text-xl font-bold gold-accent">The Address</h1>
                        <p class="text-xs text-slate-400">Issue Addressal</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='index.html'" class="px-4 py-2 rounded-lg bg-slate-700/50 hover:bg-slate-600/50 text-slate-200 font-semibold transition-colors text-sm border border-slate-600/30">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Login
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="mb-8 flex flex-wrap items-start justify-between gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-100 mb-2"><i class="fas fa-list-check mr-3 gold-accent"></i>All Submitted Issues</h2>
                <p class="text-slate-400">View all submitted issues from residents</p>
            </div>
            <a href="https://docs.google.com/spreadsheets/d/1dvLsUyog-6Rbv22WBQWClwZkabNBVYqF4ChNL1LL_vU/edit?usp=sharing"
               target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-500 hover:to-green-500 text-white font-semibold text-sm transition-all border border-emerald-400/30 shadow-lg shadow-emerald-900/30">
                <i class="fas fa-table"></i>
                Switch to Google Sheet View
                <i class="fas fa-external-link-alt text-xs opacity-75"></i>
            </a>
        </div>

        <!-- Filter Section -->
        <div class="premium-card rounded-lg px-3 py-2 mb-6 border border-slate-700">
            <div class="flex flex-wrap items-center gap-2">
                <input type="text" id="searchInput" placeholder="Search…"
                       class="flex-1 min-w-[160px] bg-slate-700/30 border border-slate-600/50 rounded-md px-2.5 py-1 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-amber-500 focus:border-transparent transition-all text-xs"
                       onkeyup="filterIssues()">
                <select id="sortSelect" onchange="filterIssues()"
                        class="bg-slate-700/30 border border-slate-600/50 rounded-md px-2 py-1 text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500 focus:border-transparent transition-all text-xs cursor-pointer">
                    <optgroup label="Sort">
                        <option value="date_desc">Newest first</option>
                        <option value="date_asc">Oldest first</option>
                        <option value="sev_desc">Sev: Critical → Low</option>
                        <option value="sev_asc">Sev: Low → Critical</option>
                        <option value="cat_asc">Cat: A → Z</option>
                        <option value="cat_desc">Cat: Z → A</option>
                        <option value="tower_asc">Tower: A → Common</option>
                        <option value="tower_desc">Tower: Common → A</option>
                    </optgroup>
                </select>
                <select id="categoryFilter" onchange="filterIssues()"
                        class="bg-slate-700/30 border border-slate-600/50 rounded-md px-2 py-1 text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500 focus:border-transparent transition-all text-xs cursor-pointer">
                    <option value="">All Categories</option>
                    <option value="Civil">Civil</option>
                    <option value="Plumbing">Plumbing</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Fire Safety">Fire Safety</option>
                    <option value="Lift">Lift</option>
                    <option value="Security">Security</option>
                    <option value="Amenities">Amenities</option>
                    <option value="Common Area">Common Area</option>
                    <option value="Documentation">Documentation</option>
                </select>
                <select id="towerFilter" onchange="filterIssues()"
                        class="bg-slate-700/30 border border-slate-600/50 rounded-md px-2 py-1 text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500 focus:border-transparent transition-all text-xs cursor-pointer">
                    <option value="">All Towers</option>
                    <option value="Tower A">Tower A</option>
                    <option value="Tower B">Tower B</option>
                    <option value="Tower C">Tower C</option>
                    <option value="Common Area">Common Area</option>
                </select>
                <select id="severityFilter" onchange="filterIssues()"
                        class="bg-slate-700/30 border border-slate-600/50 rounded-md px-2 py-1 text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500 focus:border-transparent transition-all text-xs cursor-pointer">
                    <option value="">All Severities</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="HIGH">High</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                </select>
                <button onclick="loadAllIssues()" title="Refresh"
                        class="px-2.5 py-1 rounded-md bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white text-xs font-semibold transition-all border border-blue-400/30">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Issues Container -->
        <div id="issuesContainer" class="space-y-4">
            <div class="premium-card rounded-xl p-8 text-center border border-slate-700">
                <i class="fas fa-spinner fa-spin text-amber-400 text-3xl mb-4"></i>
                <p class="text-slate-400">Loading issues...</p>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        // Store all issues for filtering
        let allIssues = [];

        // Load all issues on page load
        window.addEventListener('load', loadAllIssues);

        async function loadAllIssues() {
            try {
                // Fetch from Google Sheet via API endpoint
                const response = await fetch(API.ENDPOINT, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({
                        action: 'getFormResponses',
                        userEmail: 'ta.deskops@gmail.com'
                    })
                });

                const data = await response.json();
                
                if (data.success && data.responses) {
                    // Map Google Sheet responses to issue format
                    allIssues = data.responses.map((row, index) => ({
                        ticketID: `IRP-${String(index + 1).padStart(4, '0')}`,
                        issueTitle: row['Exact Location/Comment'] || 'Issue Report',
                        residentName: row['Resident Name'] || 'Unknown',
                        tower: row['Tower'] || 'N/A',
                        flatNumber: row['Flat Number'] || 'N/A',
                        towerFlat: `${row['Tower'] || 'N/A'} / Flat ${row['Flat Number'] || 'N/A'}`,
                        category: row['Category'] || 'N/A',
                        subCategory: row['Sub-Category'] || '',
                        severity: row['Severity'] || 'MEDIUM',
                        status: 'Reported',
                        residentPhone: 'N/A',
                        dateReported: row['Timestamp'] || new Date().toISOString(),
                        description: row['Exact Location/Comment'] || 'No details provided',
                        attachments: parseAttachments(row['Upload Photos/Video'])
                    }));
                    displayIssues(sortIssues(allIssues, document.getElementById('sortSelect')?.value || 'date_desc'));
                } else {
                    // Show error - no mock data fallback
                    document.querySelector('main .mt-6 .space-y-4').innerHTML = `
                        <div class="p-4 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400">
                            <p>⚠️ API Error: ${data.error || 'Failed to load live data'}</p>
                            <p class="text-xs mt-2">Check console for details. Endpoint: ${API.ENDPOINT}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading issues:', error);
                // Show error - no mock data fallback
                document.querySelector('main .mt-6 .space-y-4').innerHTML = `
                    <div class="p-4 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400">
                        <p>❌ Network Error: ${error.message}</p>
                        <p class="text-xs mt-2">Endpoint: ${API.ENDPOINT}</p>
                        <p class="text-xs mt-1">Check browser console (F12) → Network tab for details</p>
                    </div>
                `;
            }
        }

        function useMockData() {
            allIssues = [
                {
                    ticketID: 'TKT-001',
                    issueTitle: 'AC Unit Not Cooling Properly',
                    residentName: 'Ahmed Al Mansoori',
                    tower: 'Tower A',
                    flatNumber: '1502',
                    towerFlat: 'Tower A / Flat 1502',
                    category: 'HVAC/Cooling',
                    severity: 'HIGH',
                    status: 'Assigned',
                    residentPhone: '+971-50-123-4567',
                    dateReported: '2026-05-08',
                    description: 'The air conditioning unit in the master bedroom is not cooling properly. The temperature is not dropping below 26°C even though it\'s set to 20°C. This issue started 3 days ago.',
                    attachments: []
                },
                {
                    ticketID: 'TKT-002',
                    issueTitle: 'Water Leak from Ceiling',
                    residentName: 'Fatima Al Naqbi',
                    tower: 'Tower B',
                    flatNumber: '2308',
                    towerFlat: 'Tower B / Flat 2308',
                    category: 'Plumbing',
                    severity: 'CRITICAL',
                    status: 'In Progress',
                    residentPhone: '+971-50-234-5678',
                    dateReported: '2026-05-09',
                    description: 'Water is leaking from the ceiling in the guest bedroom. The leak appears to be coming from the apartment above. Visible water damage on the ceiling and walls.',
                    attachments: []
                },
                {
                    ticketID: 'TKT-003',
                    issueTitle: 'Cracked Tile in Kitchen',
                    residentName: 'Mohammed Al Mazrouei',
                    tower: 'Tower C',
                    flatNumber: '3102',
                    towerFlat: 'Tower C / Flat 3102',
                    category: 'Maintenance',
                    severity: 'LOW',
                    status: 'Assigned',
                    residentPhone: '+971-50-345-6789',
                    dateReported: '2026-05-07',
                    description: 'There is a cracked floor tile in the kitchen near the sink. It\'s not affecting functionality but looks unsightly.',
                    attachments: []
                },
                {
                    ticketID: 'TKT-004',
                    issueTitle: 'Broken Door Lock',
                    residentName: 'Layla Al Suwaidi',
                    tower: 'Tower D',
                    flatNumber: '1805',
                    towerFlat: 'Tower D / Flat 1805',
                    category: 'Security/Locks',
                    severity: 'MEDIUM',
                    status: 'Work Completed',
                    residentPhone: '+971-50-456-7890',
                    dateReported: '2026-05-06',
                    description: 'The main entrance door lock is not functioning properly. It\'s difficult to lock and unlock.',
                    attachments: []
                }
            ];
            displayIssues(allIssues);
        }

        function displayIssues(issues) {
            const container = document.getElementById('issuesContainer');
            
            if (!issues || issues.length === 0) {
                showNoIssues();
                return;
            }

            container.innerHTML = issues.map((issue, index) => `
                <div class="premium-card rounded-xl overflow-hidden border border-slate-700 hover:border-amber-500/50 transition-all">
                    <!-- Collapsible Header -->
                    <div class="bg-gradient-to-r from-slate-800/30 to-slate-700/20 p-4 border-b gold-border cursor-pointer hover:bg-slate-800/40 transition-all" onclick="toggleIssue(${index})">
                        <div class="flex justify-between items-start gap-4">
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-slate-100">${issue.issueTitle || 'No Title'}</h3>
                                <p class="text-sm text-slate-400 mt-2">
                                    <i class="fas fa-user mr-2"></i>${issue.residentName || 'Unknown'} | 
                                    <i class="fas fa-building mr-2"></i>${issue.towerFlat || 'N/A'}
                                </p>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${getSeverityBadge(issue.severity)}">
                                    ${issue.severity || 'N/A'}
                                </span>
                                <i class="fas fa-chevron-down text-amber-400 toggle-icon-${index} transition-transform" style="transform: rotate(0deg)"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Collapsible Content -->
                    <div class="issue-content-${index} max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                        <div class="p-5 space-y-4">
                            <!-- Where Issue Found -->
                            <div class="bg-slate-700/20 rounded-lg p-3 border border-slate-600/30">
                                <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent mb-2">
                                    <i class="fas fa-map-marker-alt mr-2"></i>Where Issue Found
                                </p>
                                <p class="text-slate-200 font-semibold text-lg">${issue.tower || 'N/A'}</p>
                            </div>

                            <!-- Reporter's Unit (Optional) -->
                            ${issue.flatNumber && issue.flatNumber !== 'N/A' ? `
                            <div class="bg-slate-700/10 rounded-lg p-3 border border-slate-600/20">
                                <p class="text-xs text-slate-400 uppercase tracking-wider mb-2">
                                    <i class="fas fa-home mr-2"></i>Reporter's Unit (Optional)
                                </p>
                                <p class="text-slate-300 font-medium">Flat ${issue.flatNumber}</p>
                            </div>
                            ` : ''}

                            <!-- Issue Details -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">Category</p>
                                    <p class="text-slate-200 font-semibold">
                                        ${issue.category || 'N/A'}${issue.subCategory ? ` <span class="text-amber-400">→</span> <span class="text-slate-300 font-normal">${issue.subCategory}</span>` : ''}
                                    </p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">Status</p>
                                    <p class="text-slate-200 font-semibold">${issue.status || 'Reported'}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">Date Reported</p>
                                    <p class="text-slate-200 font-semibold">${formatDate(issue.dateReported) || 'N/A'}</p>
                                </div>
                            </div>

                            <!-- Description -->
                            <div>
                                <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent mb-2">Description</p>
                                <p class="text-slate-300 leading-relaxed bg-slate-800/20 rounded-lg p-3 border border-slate-700/50">
                                    ${issue.description || 'No description provided'}
                                </p>
                            </div>

                            <!-- Attachments -->
                            ${issue.attachments && issue.attachments.length > 0 ? `
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">
                                            <i class="fas fa-paperclip mr-1"></i>Attachments (${issue.attachments.length})
                                        </p>
                                        <a href="https://drive.google.com/drive/folders/1oJDZT_bokWitmmgDlfulTBsjKlGdcGcPaqjJ92OEMgxQnwftLnZHWiq2NOLl7zIEq3lW53FZ?usp=sharing"
                                           target="_blank" rel="noopener noreferrer"
                                           class="text-xs text-amber-400 hover:text-amber-300 inline-flex items-center gap-1">
                                            <i class="fab fa-google-drive"></i> Open Drive folder
                                        </a>
                                    </div>
                                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                        ${issue.attachments.map(att => {
                                            const fileId = extractDriveFileId(att);
                                            const thumb = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w800` : att;
                                            const viewer = fileId ? `https://drive.google.com/file/d/${fileId}/view` : att;
                                            return `
                                            <a href="${viewer}" target="_blank" rel="noopener noreferrer"
                                               class="group relative block rounded-lg overflow-hidden border border-slate-600/40 hover:border-amber-400/60 bg-slate-800/40 transition-all aspect-square">
                                                <img src="${thumb}" alt="Attachment" loading="lazy"
                                                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                     onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'w-full h-full flex flex-col items-center justify-center text-slate-400 text-xs p-2 text-center\'><i class=\'fas fa-file-image text-2xl mb-2\'></i>Preview unavailable<span class=\'text-amber-400 mt-1\'>Click to open</span></div>'">
                                                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center p-2">
                                                    <span class="text-white text-xs font-semibold"><i class="fas fa-external-link-alt mr-1"></i>View Full Size</span>
                                                </div>
                                            </a>`;
                                        }).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterIssues() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortKey = document.getElementById('sortSelect') ? document.getElementById('sortSelect').value : 'date_desc';
            const catFilter = document.getElementById('categoryFilter') ? document.getElementById('categoryFilter').value : '';
            const towerFilter = document.getElementById('towerFilter') ? document.getElementById('towerFilter').value : '';
            const sevFilter = document.getElementById('severityFilter') ? document.getElementById('severityFilter').value : '';

            const filtered = allIssues.filter(issue => {
                const searchStr = `${issue.ticketID} ${issue.residentName} ${issue.category} ${issue.subCategory} ${issue.issueTitle} ${issue.towerFlat}`.toLowerCase();
                if (!searchStr.includes(searchTerm)) return false;
                if (catFilter && String(issue.category).trim().toLowerCase() !== catFilter.toLowerCase()) return false;
                if (towerFilter && String(issue.tower).trim().toLowerCase() !== towerFilter.toLowerCase()) return false;
                if (sevFilter && String(issue.severity).trim().toUpperCase() !== sevFilter.toUpperCase()) return false;
                return true;
            });

            displayIssues(sortIssues(filtered, sortKey));
        }

        function sortIssues(issues, key) {
            // Canonical orderings (matching the Google Form dropdowns)
            const severityOrder = ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'];
            const categoryOrder = ['Civil', 'Plumbing', 'Electrical', 'Fire Safety', 'Lift', 'Security', 'Amenities', 'Common Area', 'Documentation'];
            const towerOrder    = ['Tower A', 'Tower B', 'Tower C', 'Common Area'];

            const rankIn = (list, value, caseInsensitive = false) => {
                if (!value) return 999;
                const v = caseInsensitive ? String(value).toUpperCase() : String(value).trim();
                const idx = caseInsensitive
                    ? list.indexOf(v)
                    : list.findIndex(x => x.toLowerCase() === v.toLowerCase());
                return idx === -1 ? 999 : idx;  // unknown values sort to the end
            };
            const sevRank   = i => rankIn(severityOrder, i.severity, true);
            const catRank   = i => rankIn(categoryOrder, i.category);
            const towerRank = i => rankIn(towerOrder, i.tower);
            const dateOf    = i => { const d = new Date(i.dateReported); return isNaN(d) ? 0 : d.getTime(); };

            const arr = [...issues];
            switch (key) {
                case 'date_asc':   arr.sort((a,b) => dateOf(a) - dateOf(b)); break;
                case 'sev_desc':   arr.sort((a,b) => sevRank(a)   - sevRank(b)   || dateOf(b) - dateOf(a)); break;
                case 'sev_asc':    arr.sort((a,b) => sevRank(b)   - sevRank(a)   || dateOf(b) - dateOf(a)); break;
                case 'cat_asc':    arr.sort((a,b) => catRank(a)   - catRank(b)   || dateOf(b) - dateOf(a)); break;
                case 'cat_desc':   arr.sort((a,b) => catRank(b)   - catRank(a)   || dateOf(b) - dateOf(a)); break;
                case 'tower_asc':  arr.sort((a,b) => towerRank(a) - towerRank(b) || dateOf(b) - dateOf(a)); break;
                case 'tower_desc': arr.sort((a,b) => towerRank(b) - towerRank(a) || dateOf(b) - dateOf(a)); break;
                case 'date_desc':
                default:           arr.sort((a,b) => dateOf(b) - dateOf(a));
            }
            return arr;
        }

        function toggleIssue(index) {
            const content = document.querySelector(`.issue-content-${index}`);
            const icon = document.querySelector(`.toggle-icon-${index}`);
            
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                // Collapse
                content.style.maxHeight = '0px';
                icon.style.transform = 'rotate(0deg)';
            } else {
                // Expand
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function showNoIssues() {
            document.getElementById('issuesContainer').innerHTML = `
                <div class="premium-card rounded-xl p-12 text-center border border-slate-700">
                    <i class="fas fa-inbox text-slate-500 text-4xl mb-4"></i>
                    <p class="text-slate-400 text-lg">No issues found</p>
                    <p class="text-slate-500 text-sm mt-2">Check back later for new submitted issues</p>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('issuesContainer').innerHTML = `
                <div class="premium-card rounded-xl p-8 text-center border border-red-500/30 bg-red-500/10">
                    <i class="fas fa-exclamation-circle text-red-400 text-3xl mb-4"></i>
                    <p class="text-red-300">${message}</p>
                </div>
            `;
        }

        function getSeverityBadge(severity) {
            const badges = {
                'CRITICAL': 'bg-red-600/30 text-red-200 border border-red-500/50',
                'HIGH': 'bg-orange-600/30 text-orange-200 border border-orange-500/50',
                'MEDIUM': 'bg-yellow-600/30 text-yellow-200 border border-yellow-500/50',
                'LOW': 'bg-green-600/30 text-green-200 border border-green-500/50'
            };
            return badges[severity] || 'bg-slate-600/30 text-slate-200 border border-slate-500/50';
        }

        function parseAttachments(value) {
            if (!value) return [];
            // Google Forms file uploads are comma-separated URLs
            return String(value).split(',').map(s => s.trim()).filter(Boolean);
        }

        function extractDriveFileId(url) {
            if (!url) return null;
            // Match formats: ?id=FILE_ID  or  /file/d/FILE_ID/  or  /d/FILE_ID
            const m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/) ||
                      url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) ||
                      url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            return m ? m[1] : null;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                return new Date(dateStr).toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }
    </script>
