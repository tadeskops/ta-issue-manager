name: parse-check (preview HTML script blocks)

# Apps Script server-side .gs files can only be validated by clasp push
# (see requirement.md §19.10 — "clasp push IS the syntax check"). This
# workflow catches the OTHER class of parse errors: inline <script>
# blocks inside src/pages/*.html that would silently kill a whole page
# in production. The preview builder expands all includes; we then run
# `node --check` on every <script> body wrapped in an async IIFE.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/build-preview.js'
      - '.github/workflows/parse-check.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/build-preview.js'
      - '.github/workflows/parse-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parse-check:
    name: node --check on preview <script> bodies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build preview HTML pages
        run: node scripts/build-preview.js

      - name: Parse-check every inline <script> block
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for f in preview/*.html; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .html)
            node -e "
              const fs = require('fs');
              const html = fs.readFileSync(process.argv[1], 'utf8');
              const re = /<script>([\\s\\S]+?)<\\/script>/g;
              let m, i = 0;
              while ((m = re.exec(html)) !== null) {
                i++;
                const body = m[1].trim();
                if (!body) continue;
                const wrapped = '(async () => {\n' + body + '\n})();';
                fs.writeFileSync('/tmp/_chk_' + process.argv[2] + '_' + i + '.js', wrapped);
              }
            " "$f" "$base"
          done
          for js in /tmp/_chk_*.js; do
            [ -f "$js" ] || continue
            if ! node --check "$js"; then
              echo "::error file=$js::syntax error"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more preview <script> blocks failed parse-check"
            exit 1
          fi
          echo "All preview <script> blocks parsed clean."

  parse-check-gs:
    name: node --check on src/**/*.gs (server-side)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # `clasp push` is the *authoritative* syntax check for Apps Script,
      # but it runs after code is already live. This job catches the
      # obvious "unexpected token" / "await outside async" / dangling
      # brace class of parse errors BEFORE merge so a bad push never
      # reaches the deploy job. Node's V8 parser and Apps Script's V8
      # runtime agree on syntax; semantic differences (SpreadsheetApp,
      # DriveApp, etc.) don't matter for parse-only checks.
      - name: Parse-check every .gs as JavaScript
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          shopt -s globstar nullglob
          count=0
          for gs in src/**/*.gs; do
            [ -f "$gs" ] || continue
            count=$((count + 1))
            # Copy to a .js path so `node --check` treats it as a script.
            js="/tmp/gs_$(echo "$gs" | tr '/.' '__').js"
            cp "$gs" "$js"
            if ! node --check "$js" 2> "/tmp/err_$$"; then
              echo "::error file=$gs::$(cat /tmp/err_$$)"
              fail=1
            fi
            rm -f /tmp/err_$$
          done
          echo "Parse-checked $count .gs file(s)."
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more .gs files failed node --check. Fix syntax before merge."
            exit 1
          fi
          echo "All .gs files parsed clean."
