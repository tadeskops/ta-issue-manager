name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'appsscript.json'
      - '.claspignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_new_version:
        description: 'Also publish a new web-app deployment version'
        type: boolean
        default: false

concurrency:
  group: apps-script-deploy
  cancel-in-progress: false

jobs:
  push:
    name: clasp push (+ optional deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials from secret
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::CLASPRC_JSON secret is empty or unset. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Accept either raw JSON or base64-encoded JSON (recommended — immune to paste corruption).
          if printf '%s' "$CLASPRC_JSON" | base64 -d > "$HOME/.clasprc.json" 2>/dev/null \
             && node -e "JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json','utf8'))" 2>/dev/null; then
            echo "Detected base64-encoded secret; decoded successfully."
          else
            printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
            echo "Wrote secret as raw JSON."
          fi
          chmod 600 "$HOME/.clasprc.json"
          BYTES=$(wc -c < "$HOME/.clasprc.json")
          echo "Final $HOME/.clasprc.json size: $BYTES bytes"
          node -e "try { const j = JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json','utf8')); console.log('.clasprc.json: valid JSON, top-level keys =', Object.keys(j).join(',')); } catch(e) { console.error('::error::Invalid JSON in .clasprc.json — secret is corrupted or truncated:', e.message); process.exit(1); }"

      - name: Write project link from secret
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          if [ -z "$CLASP_JSON" ]; then
            echo "::error::CLASP_JSON secret is empty or unset."
            exit 1
          fi
          if printf '%s' "$CLASP_JSON" | base64 -d > .clasp.json 2>/dev/null \
             && node -e "JSON.parse(require('fs').readFileSync('.clasp.json','utf8'))" 2>/dev/null; then
            echo "Detected base64-encoded secret; decoded successfully."
          else
            printf '%s' "$CLASP_JSON" > .clasp.json
            echo "Wrote secret as raw JSON."
          fi
          BYTES=$(wc -c < .clasp.json)
          echo "Final .clasp.json size: $BYTES bytes"
          node -e "try { const j = JSON.parse(require('fs').readFileSync('.clasp.json','utf8')); console.log('.clasp.json: valid JSON, scriptId =', (j.scriptId||'').slice(0,8)+'…'); } catch(e) { console.error('::error::Invalid JSON in .clasp.json:', e.message); process.exit(1); }"

      - name: clasp push -f
        run: clasp push -f

      - name: Publish new web-app deployment
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true
        run: |
          DESC="Auto-deploy $(date -u +'%Y-%m-%d %H:%M UTC') ${{ github.sha }}"
          if [ -n "${{ secrets.DEPLOYMENT_ID }}" ]; then
            clasp update-deployment "${{ secrets.DEPLOYMENT_ID }}" --description "$DESC"
          else
            clasp create-deployment --description "$DESC"
          fi
