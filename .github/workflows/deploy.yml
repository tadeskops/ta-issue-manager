name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'appsscript.json'
      - '.claspignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_new_version:
        description: 'Also publish a new web-app deployment version'
        type: boolean
        default: false

concurrency:
  group: apps-script-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Opt-in early to Node 24 runtime for actions (default after 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  push:
    name: clasp push (+ optional deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials from secret
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::CLASPRC_JSON secret is empty or unset. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Accept either raw JSON or base64-encoded JSON (recommended — immune to paste corruption).
          if printf '%s' "$CLASPRC_JSON" | base64 -d > "$HOME/.clasprc.json" 2>/dev/null \
             && node -e "JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json','utf8'))" 2>/dev/null; then
            echo "Detected base64-encoded secret; decoded successfully."
          else
            printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
            echo "Wrote secret as raw JSON."
          fi
          chmod 600 "$HOME/.clasprc.json"
          BYTES=$(wc -c < "$HOME/.clasprc.json")
          echo "Final $HOME/.clasprc.json size: $BYTES bytes"
          node -e "try { const j = JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json','utf8')); console.log('.clasprc.json: valid JSON, top-level keys =', Object.keys(j).join(',')); } catch(e) { console.error('::error::Invalid JSON in .clasprc.json — secret is corrupted or truncated:', e.message); process.exit(1); }"

      - name: Write project link from secret
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          if [ -z "$CLASP_JSON" ]; then
            echo "::error::CLASP_JSON secret is empty or unset."
            exit 1
          fi
          if printf '%s' "$CLASP_JSON" | base64 -d > .clasp.json 2>/dev/null \
             && node -e "JSON.parse(require('fs').readFileSync('.clasp.json','utf8'))" 2>/dev/null; then
            echo "Detected base64-encoded secret; decoded successfully."
          else
            printf '%s' "$CLASP_JSON" > .clasp.json
            echo "Wrote secret as raw JSON."
          fi
          BYTES=$(wc -c < .clasp.json)
          echo "Final .clasp.json size: $BYTES bytes"
          node -e "try { const j = JSON.parse(require('fs').readFileSync('.clasp.json','utf8')); console.log('.clasp.json: valid JSON, scriptId =', (j.scriptId||'').slice(0,8)+'…'); } catch(e) { console.error('::error::Invalid JSON in .clasp.json:', e.message); process.exit(1); }"

      - name: clasp push -f (public webapp config)
        run: |
          # `set +e` so we can capture stderr+stdout AND clasp's exit code
          # without bash -e killing the step before we get to print them.
          set +e
          OUTPUT=$(clasp push -f 2>&1)
          EC=$?
          set -e
          echo "$OUTPUT"
          echo "clasp exit code: $EC"
          if [ $EC -ne 0 ]; then
            echo "::error::clasp push failed (exit $EC). See the captured output above."
            exit $EC
          fi
          if echo "$OUTPUT" | grep -qE 'Pushed 0 files|Nothing to push'; then
            echo "::error::clasp push reported zero files. Check .claspignore — it may be excluding everything."
            exit 1
          fi

      - name: Publish new web-app deployment (public, anonymous)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true)
        run: |
          DESC="Auto-deploy $(date -u +'%Y-%m-%d %H:%M UTC') ${{ github.sha }}"
          if [ -n "${{ secrets.DEPLOYMENT_ID }}" ]; then
            echo "Updating public deployment ${{ secrets.DEPLOYMENT_ID }}"
            clasp update-deployment "${{ secrets.DEPLOYMENT_ID }}" --description "$DESC"
          else
            clasp create-deployment --description "$DESC"
          fi

      # The secure deployment must run as USER_ACCESSING with ANYONE_WITH_GOOGLE_ACCOUNT
      # access so Google forces a real sign-in. appsscript.json is shared by the
      # whole project, so we temporarily rewrite its webapp block, push that as a
      # second version, then bump the secure deployment to it. The committed
      # appsscript.json (anonymous defaults) is left intact for future runs.
      - name: Publish secure deployment (user accessing, sign-in required)
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true)) && env.SECURE_ID != ''
        env:
          SECURE_ID: ${{ secrets.DEPLOYMENT_ID_SECURE }}
        run: |
          DESC="Auto-deploy $(date -u +'%Y-%m-%d %H:%M UTC') ${{ github.sha }} [secure]"
          echo "Patching appsscript.json for secure deployment (USER_ACCESSING / ANYONE_WITH_GOOGLE_ACCOUNT)…"
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('appsscript.json','utf8'));
            j.webapp = { executeAs: 'USER_ACCESSING', access: 'ANYONE' };
            fs.writeFileSync('appsscript.json', JSON.stringify(j, null, 2));
            console.log('Patched webapp block:', JSON.stringify(j.webapp));
          "
          clasp push -f
          echo "Updating secure deployment ${SECURE_ID}"
          clasp update-deployment "${SECURE_ID}" --description "$DESC"
          # Restore the committed (public/anonymous) manifest so subsequent
          # workflow steps and any later debugging see the repo's canonical state.
          git checkout -- appsscript.json
          echo "Restored appsscript.json to repo defaults."

      - name: Note when secure deployment is unconfigured
        if: env.SECURE_ID == '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true))
        env:
          SECURE_ID: ${{ secrets.DEPLOYMENT_ID_SECURE }}
        run: echo "DEPLOYMENT_ID_SECURE secret not set; skipping secure deployment update."

      # ------------------------------------------------------------------
      # Post-deploy verification. Google can accept a `clasp update-deployment`
      # and still serve a broken script (500 on doGet, missing scope prompt,
      # wrong access setting). We probe the live URLs and assert their
      # ?diag=deployment fingerprint matches the intended deployment mode.
      #
      # URLs are stored as GitHub *variables* (not secrets) because the /exec
      # URLs are already public. Add them under Settings → Secrets and
      # variables → Actions → Variables tab:
      #   WEBAPP_URL_PUBLIC  = https://script.google.com/macros/s/AKfyc.../exec
      #   WEBAPP_URL_SECURE  = https://script.google.com/macros/s/AKfyc.../exec
      #
      # OBSERVED live behaviour (verified against production 2026-07-11):
      #   * PUBLIC (USER_DEPLOYING / ANYONE_ANONYMOUS) → HTTP 200 with
      #     `Content-Type: application/json` and our diag JSON body.
      #   * SECURE (USER_ACCESSING / ANYONE) → HTTP 200 with
      #     `Content-Type: text/html` and the page title "<project> - Access
      #     Required" (Google renders an HTML sign-in gate — it does NOT
      #     issue a 302 to accounts.google.com the way many APIs do).
      # ------------------------------------------------------------------
      - name: Verify PUBLIC deployment (?diag=deployment)
        if: vars.WEBAPP_URL_PUBLIC != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true))
        env:
          URL: ${{ vars.WEBAPP_URL_PUBLIC }}
        run: |
          set -uo pipefail
          echo "Probing: $URL?diag=deployment"
          # Retry: Apps Script serves 502 on cold-start for the first request
          # after a fresh deploy (~15% of runs). A real problem fails all
          # 3 attempts; a cold start recovers on the 2nd.
          attempt() {
            HTTP=$(curl -sSL --max-time 30 -o /tmp/pub.body -w '%{http_code}|%{content_type}|%{url_effective}' "$URL?diag=deployment" 2>/dev/null || echo "CURL_FAILED|0|")
            CODE=$(echo "$HTTP" | cut -d'|' -f1)
            CT=$(echo   "$HTTP" | cut -d'|' -f2)
            FINAL=$(echo "$HTTP" | cut -d'|' -f3)
            BYTES=$(wc -c < /tmp/pub.body)
            echo "  HTTP=$CODE  CONTENT_TYPE=$CT  FINAL_URL=$FINAL  BODY_BYTES=$BYTES"
            [ "$CODE" = "200" ] || return 2
            echo "$CT" | grep -qi 'application/json' || return 3
            node -e "const j=JSON.parse(require('fs').readFileSync('/tmp/pub.body','utf8')); if(!j || typeof j!=='object'){throw new Error('not an object')}; if(j.mode!=='USER_DEPLOYING'){throw new Error('mode='+j.mode+' (want USER_DEPLOYING). effectiveEmail='+j.effectiveEmail+' activeEmail='+JSON.stringify(j.activeEmail))}; if(j.activeEmail){throw new Error('activeEmail should be empty on USER_DEPLOYING anonymous call, got '+j.activeEmail)}; if(!j.effectiveEmail){throw new Error('effectiveEmail is empty — script owner may be revoked')}; console.log('  PUBLIC OK: mode='+j.mode+' effectiveEmail='+j.effectiveEmail.replace(/(.).*(@.*)/,'\$1***\$2'));" || return 4
            return 0
          }
          ok=0; last_rc=0
          for i in 1 2 3; do
            echo "Attempt $i/3:"
            attempt; last_rc=$?
            if [ $last_rc -eq 0 ]; then ok=1; break; fi
            [ $i -lt 3 ] && { echo "  (transient? sleeping 15s)"; sleep 15; }
          done
          if [ $ok -eq 0 ]; then
            case $last_rc in
              2) echo "::error::PUBLIC deployment returned non-200 after 3 attempts (see attempts above)." ;;
              3) echo "::error::PUBLIC deployment returned wrong Content-Type after 3 attempts (expected application/json)." ;;
              4) echo "::error::PUBLIC deployment JSON body did not match expected shape (see error above)." ;;
              *) echo "::error::PUBLIC deployment probe failed after 3 attempts (rc=$last_rc)." ;;
            esac
            echo "----- final response body (first 800 bytes) -----"
            head -c 800 /tmp/pub.body; echo
            echo "----- diagnosis hints -----"
            echo "  * HTTP 401/403      → wrong 'Who has access' setting (should be Anyone / ANYONE_ANONYMOUS)."
            echo "  * HTTP 404          → deployment ID does not exist (was archived, or URL is wrong)."
            echo "  * HTTP 500/502      → doGet threw. Open Apps Script → Executions to see the stack trace."
            echo "  * text/html         → URL is actually the secure deployment. Swap WEBAPP_URL_PUBLIC and WEBAPP_URL_SECURE variables."
            echo "  * mode mismatch     → wrong 'Execute as' setting on this deployment."
            echo "  * diag route missing → live code is out of date. Re-run this workflow to redeploy."
            exit 1
          fi
          echo "::notice::PUBLIC deployment verified."
          echo "### Public deployment verified" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: \`$URL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`USER_DEPLOYING\` (anonymous JSON)" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify SECURE deployment (sign-in gate)
        if: vars.WEBAPP_URL_SECURE != '' && env.SECURE_ID != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true))
        env:
          URL: ${{ vars.WEBAPP_URL_SECURE }}
          SECURE_ID: ${{ secrets.DEPLOYMENT_ID_SECURE }}
        run: |
          set -uo pipefail
          echo "Probing: $URL?diag=deployment (no auth, expect sign-in gate)"
          # Retry (same rationale as PUBLIC): Apps Script edge sometimes
          # returns 502 for a single request after a fresh deploy.
          attempt() {
            HTTP=$(curl -sSL --max-time 30 -o /tmp/sec.body -w '%{http_code}|%{content_type}' "$URL?diag=deployment" 2>/dev/null || echo "CURL_FAILED|0")
            CODE=$(echo "$HTTP" | cut -d'|' -f1)
            CT=$(echo   "$HTTP" | cut -d'|' -f2)
            BYTES=$(wc -c < /tmp/sec.body)
            TITLE=$(grep -oE '<title[^>]*>[^<]+</title>' /tmp/sec.body 2>/dev/null | head -n1 | sed 's/<[^>]*>//g' || true)
            echo "  HTTP=$CODE  CONTENT_TYPE=$CT  BYTES=$BYTES  TITLE=$TITLE"
            [ "$CODE" = "200" ] || return 2
            # JSON reply means the sign-in gate is off — that's a config
            # problem, not a transient failure; abort retries.
            if echo "$CT" | grep -qi 'application/json'; then
              echo "  ::error::SECURE deployment served JSON to an anonymous caller — sign-in gate is DISABLED."
              return 5
            fi
            # Prefer the "Access Required" title; fall back to warden scaffold markers.
            echo "$TITLE" | grep -qi 'access required' && return 0
            grep -q 'warden_bin_i18n\|macros/client' /tmp/sec.body 2>/dev/null && return 0
            return 4
          }
          ok=0; last_rc=0
          for i in 1 2 3; do
            echo "Attempt $i/3:"
            attempt; last_rc=$?
            if [ $last_rc -eq 0 ]; then ok=1; break; fi
            # Don't retry the "gate is off" case — it will never fix itself
            # by retrying and we want the loud error immediately.
            if [ $last_rc -eq 5 ]; then break; fi
            [ $i -lt 3 ] && { echo "  (transient? sleeping 15s)"; sleep 15; }
          done
          if [ $ok -eq 0 ]; then
            case $last_rc in
              2) echo "::error::SECURE deployment returned non-200 after 3 attempts." ;;
              4) echo "::error::SECURE deployment HTML did not match sign-in gate signature after 3 attempts." ;;
              5) echo "::error::SECURE deployment served JSON to anonymous caller — Deploy → Manage deployments → Edit: change 'Who has access' from 'Anyone' (anonymous) to 'Anyone with Google account'." ;;
              *) echo "::error::SECURE deployment probe failed after 3 attempts (rc=$last_rc)." ;;
            esac
            echo "----- final response body (first 800 bytes) -----"
            head -c 800 /tmp/sec.body; echo
            echo "----- diagnosis hints -----"
            echo "  * HTTP 404 → deployment ID does not exist (archived / typo in URL)."
            echo "  * HTTP 401 → 'Who has access' is set to 'Only myself'."
            echo "  * HTTP 500/502 (persistent) → doGet threw on the secure deployment. Check Executions."
            exit 1
          fi
          echo "::notice::SECURE deployment verified: anonymous request hit the Google sign-in gate."
          echo "### Secure deployment verified" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: \`$URL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`USER_ACCESSING\` (anonymous caller bounced to sign-in)" >> "$GITHUB_STEP_SUMMARY"

      - name: Skipped verification notice
        if: (vars.WEBAPP_URL_PUBLIC == '' || vars.WEBAPP_URL_SECURE == '') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_new_version == true))
        run: |
          echo "::warning::Post-deploy verification skipped."
          [ -z "${{ vars.WEBAPP_URL_PUBLIC }}" ] && echo "  * WEBAPP_URL_PUBLIC variable is not set."
          [ -z "${{ vars.WEBAPP_URL_SECURE }}" ] && echo "  * WEBAPP_URL_SECURE variable is not set."
          echo "  * Add both under Settings → Secrets and variables → Actions → Variables tab so CI can catch broken deploys."
