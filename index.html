<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Address - IRP Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1f2e;
            --accent: #d4af37;
            --light: #f5f7fa;
        }
        
        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
        }
        
        .premium-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .gold-accent {
            color: #d4af37;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 min-h-screen flex items-center justify-center px-4">
    <div class="premium-card rounded-2xl p-10 w-full max-w-md border border-slate-700">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <!-- Logo Only (Compact) -->
            <div class="mb-6">
                <img src="assets/images/TaLogo.png" alt="The Address" class="h-16 mx-auto drop-shadow-lg">
            </div>
            <!-- Alternative: Logo with Text (Uncomment to use) -->
            <!-- <div class="mb-6"><img src="assets/images/TaLogoName.png" alt="The Address" class="h-20 mx-auto drop-shadow-lg"></div> -->
            <h2 class="text-xl font-bold text-slate-100 mb-2">Issue Addressal Portal</h2>
        </div>
        
        <!-- View Submitted Issues Button (Primary Action) -->
        <button onclick="window.location.href='submitted-issues.html'" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-4 rounded-lg transition-all border border-blue-400/30 shadow-lg hover:shadow-xl text-sm uppercase tracking-wider mb-6">
            <i class="fas fa-eye mr-2"></i>View Submitted Issues (Read Only)
        </button>

        <!-- OR Divider -->
        <div class="flex items-center gap-4 my-6">
            <div class="flex-1 h-px bg-gradient-to-r from-slate-700 to-transparent"></div>
            <span class="text-amber-400 font-bold">OR</span>
            <div class="flex-1 h-px bg-gradient-to-l from-slate-700 to-transparent"></div>
        </div>
        
        <!-- Login Form (Visually Disabled - Still Functional) -->
        <div id="loginContainer" class="space-y-5 opacity-40 hover:opacity-100 transition-opacity duration-300">
            <!-- Email Input -->
            <div>
                <label class="block text-xs font-bold gold-accent uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="emailInput" placeholder="your.email@example.com" 
                       class="w-full bg-slate-700/30 border border-slate-600/50 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all backdrop-blur text-sm">
            </div>
            
            <!-- Role Selection -->
            <div>
                <label class="block text-xs font-bold gold-accent uppercase tracking-wider mb-2">Select Role</label>
                <select id="roleSelect" class="w-full bg-slate-700/30 border border-slate-600/50 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all backdrop-blur text-sm">
                    <option value="">Choose your role...</option>
                    <option value="COMMITTEE">Technical Committee Member</option>
                    <option value="BUILDER">Builder/Contractor (Task Execution)</option>
                </select>
            </div>
            
            <!-- Error Message -->
            <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg text-sm backdrop-blur"></div>
            
            <!-- Submit Button -->
            <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-amber-600 to-yellow-600 hover:from-amber-500 hover:to-yellow-500 text-white font-bold py-3 rounded-lg transition-all border border-amber-400/30 shadow-lg hover:shadow-xl text-sm uppercase tracking-wider">
                <i class="fas fa-sign-in-alt mr-2"></i>Access Dashboard
            </button>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-xs text-slate-500 mt-6">
            Enter your email and select your role to access the platform
        </p>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const role = document.getElementById('roleSelect').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // Validate inputs
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            if (!email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }
            
            if (!role) {
                showError('Please select your role');
                return;
            }
            
            // Clear any existing errors
            errorMsg.classList.add('hidden');
            
            // Store session
            sessionStorage.setItem('userEmail', email);
            sessionStorage.setItem('userRole', role);
            
            // Redirect based on role
            if (role === 'COMMITTEE') {
                window.location.href = 'committee-dashboard.html';
            } else if (role === 'BUILDER') {
                window.location.href = 'builder-dashboard.html';
            }
        }
        
        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
        
        // Allow Enter key to submit
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('roleSelect').focus();
        });
        
        document.getElementById('roleSelect').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
