<!--
  PDF Issues Report — shared partial.

  Drop on any page that has issue arrays in memory. Exposes
    window.IRP_REPORT.open({
      pageContext: "committee" | "builder" | "submitted",
      title:       "Committee Issues Report",
      filtersAppliedSummary: "Active=Critical, Closed=All",
      sources: [
        {
          key:   "pending",
          label: "Pending Approval",
          color: [59, 130, 246],   // section band
          data:  pendingIssues,    // array of normalized issue objects
          enabled: true             // pre-checked in wizard
        },
        ...
      ],
      // Optional per-view column scoping. If omitted, all 16 catalog
      // columns appear in the wizard. Provide a subset of catalog keys
      // (see COLUMN_CATALOG below) to restrict what the user can pick.
      columnKeys:       ["ticketId", "description", "status"],
      // Optional override of which of the visible columns are pre-
      // checked. Defaults to the catalog's `on` flag for each.
      columnDefaultsOn: ["ticketId", "description", "status"]
    })

  Gated client-side by FEATURE_PDF_REPORT (see render gate at bottom).
  The button on each page should also be hidden by the same flag — the
  open() call defends in case it is invoked from a stale render.
-->

<!-- jsPDF + autotable from cdnjs (allowed inside HtmlService iframe) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<!-- Wizard modal -->
<div id="reportWizardModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-50 items-center justify-center p-4" style="display:none;">
    <div class="bg-slate-900 border border-slate-700 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="px-5 py-3 border-b border-slate-700 flex justify-between items-center sticky top-0 bg-slate-900 z-10">
            <h3 class="text-base font-bold text-amber-300 uppercase tracking-wider">
                <i class="fas fa-file-pdf mr-2"></i>Export Report
            </h3>
            <button onclick="IRP_REPORT.close()" class="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
        </div>
        <div id="reportWizardBody" class="p-5 space-y-5 text-slate-200 text-sm"></div>
        <div class="px-5 py-3 border-t border-slate-700 flex flex-wrap items-center gap-2 sticky bottom-0 bg-slate-900">
            <!-- Inline progress lives in the footer beside the action
                 buttons so the user sees the rotating disk + status text
                 right next to the (disabled) Preview/Download controls.
                 Wrapped in its own dark slate pill so the amber text is
                 readable regardless of the surrounding footer surface. -->
            <div id="reportProgress" class="hidden flex-1 min-w-[180px] flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-900 border border-amber-500/50 shadow-sm">
                <div class="relative flex-shrink-0">
                    <div class="w-6 h-6 rounded-full border-[3px] border-amber-500/30 border-t-amber-300 animate-spin"></div>
                    <i class="fas fa-file-pdf absolute inset-0 m-auto text-amber-300 text-[10px]"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div id="reportProgressText" class="text-amber-100 text-[11px] font-semibold truncate">Working…</div>
                    <div class="mt-1 h-1.5 rounded bg-slate-700 overflow-hidden">
                        <div id="reportProgressBar" class="h-full bg-gradient-to-r from-amber-300 to-orange-400 transition-all duration-200" style="width:0%"></div>
                    </div>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 justify-end ml-auto">
                <button id="reportCancelBtn" onclick="IRP_REPORT.close()"
                    class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold uppercase">Cancel</button>
                <button id="reportPreviewBtn" onclick="IRP_REPORT._generate('preview')"
                    class="px-4 py-2 rounded-lg bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-xs font-bold uppercase">
                    <i class="fas fa-eye mr-1"></i>Preview
                </button>
                <button id="reportDownloadBtn" onclick="IRP_REPORT._generate('download')"
                    class="px-4 py-2 rounded-lg bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white text-xs font-bold uppercase">
                    <i class="fas fa-download mr-1"></i>Download
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    "use strict";

    // ----- Column catalog --------------------------------------------------
    // One canonical list across all sources. Each column knows how to read
    // a value out of the normalized issue object that getPendingIssues /
    // getLiveIssues / getClosedIssues / getSubmittedIssues return.
    var COLUMN_CATALOG = [
        { key: "ticketId",     label: "Ticket ID",      width: 22, on: true,  always: true,  read: function (i) { return i.ticketId || ""; } },
        { key: "dateReported", label: "Submitted",      width: 22, on: true,                   read: function (i) { return _shortDate(i.dateReported); } },
        { key: "tower",        label: "Tower / Unit",   width: 22, on: true,                   read: function (i) {
            var t = (i.location && i.location.tower) || "";
            var f = (i.location && i.location.flat) || "";
            return t && f ? (t + " / " + f) : (t || f); } },
        { key: "resident",     label: "Resident",       width: 28, on: true,                   read: function (i) { return (i.resident && i.resident.name) || ""; } },
        { key: "category",     label: "Category",       width: 26, on: true,                   read: function (i) { return (i.issue && i.issue.category) || ""; } },
        { key: "subcategory",  label: "Subcategory",    width: 26, on: false,                  read: function (i) { return (i.issue && i.issue.subcategory) || ""; } },
        { key: "severity",     label: "Severity",       width: 18, on: true,                   read: function (i) { return (i.issue && i.issue.severity) || "—"; } },
        { key: "status",       label: "Status",         width: 22, on: true,                   read: function (i) { return i.state || i.status || (i.builder && i.builder.status) || ""; } },
        { key: "description",  label: "Description",    width: 60, on: true,                   read: function (i) { return (i.issue && i.issue.description) || ""; } },
        { key: "slaDue",       label: "SLA Due",        width: 22, on: false,                  read: function (i) { return _shortDate(i.sla && i.sla.dueDate); } },
        { key: "breached",     label: "Breached",       width: 18, on: false,                  read: function (i) { return (i.sla && i.sla.breached) ? "Yes" : "No"; } },
        { key: "vendor",       label: "Vendor",         width: 28, on: false,                  read: function (i) { return (i.builder && i.builder.assignedVendor) || ""; } },
        { key: "remarks",      label: "Builder Remarks", width: 40, on: false,                 read: function (i) { return (i.builder && i.builder.comment) || ""; } },
        { key: "actionBy",     label: "Action By",      width: 28, on: false,                  read: function (i) { return i.actionBy || i.approvedBy || ""; } },
        { key: "actionDate",   label: "Action Date",    width: 22, on: false,                  read: function (i) { return _shortDate(i.actionDate || i.lastUpdated); } },
        { key: "rejectionReason", label: "Rejection",   width: 40, on: false,                  read: function (i) { return i.rejectionReason || ""; } },
        // Photos column renders thumbnails inline via the autoTable
        // didDrawCell hook. read() joins the Drive links with a | sentinel
        // so didParseCell / didDrawCell can recover the list without an
        // out-of-band map. Width + min height come from columnStyles in
        // _drawSection. Active only when the wizard's photos checkbox is on.
        { key: "photos",       label: "Photos",         width: 50, on: true,                    read: function (i) {
            var links = (i.issue && i.issue.photoLinks) || [];
            return Array.isArray(links) ? links.join("|") : ""; } }
    ];

    // Inline thumbnail geometry (mm). Same constants drive the end-of-section
    // gallery so the two surfaces stay visually consistent.
    var INLINE_THUMB = { w: 18, h: 14, gap: 1.5, pad: 1, perRowCap: 4 };

    var SEV_COLOR = {
        "CRITICAL": [220, 38, 38],
        "HIGH":     [234, 88, 12],
        "MEDIUM":   [202, 138, 4],
        "LOW":      [37, 99, 235]
    };

    var _state = {
        opts:    null,    // last open() args
        sources: [],      // working copy of source toggles
        cols:    [],      // working copy of column toggles (subset of catalog)
        photos:  { enabled: true },
        running: false
    };

    function _shortDate(iso) {
        if (!iso) return "";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        var dd = String(d.getDate()).padStart(2, "0");
        var mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
        var yy = String(d.getFullYear()).slice(-2);
        return dd + " " + mon + " " + yy;
    }

    function _esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
            return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[c];
        });
    }

    function _featureOn() {
        var f = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.features) || {};
        return f.FEATURE_PDF_REPORT === true;
    }

    function _slaOn() {
        var f = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.features) || {};
        return f.FEATURE_SLA === true;
    }

    var SLA_COL_KEYS = ["slaDue", "breached"];

    // ----- Wizard ----------------------------------------------------------

    function open(opts) {
        if (!_featureOn()) {
            if (window.showToast) window.showToast("✗ PDF report is disabled", "error");
            else alert("PDF report is disabled.");
            return;
        }
        _state.opts = opts || {};
        _state.sources = (opts.sources || []).map(function (s) {
            return {
                key:     s.key,
                label:   s.label,
                color:   s.color || [71, 85, 105],
                data:    Array.isArray(s.data) ? s.data : [],
                enabled: s.enabled !== false && (Array.isArray(s.data) ? s.data.length : 0) > 0
            };
        });
        // Per-view column scoping. `columnKeys` restricts which catalog
        // entries appear in the wizard; `columnDefaultsOn` overrides which
        // of those start checked. Keep ticketId in the visible set even if
        // the caller forgot it (it is `always`-required).
        var allowedKeys = Array.isArray(opts.columnKeys) ? opts.columnKeys.slice() : null;
        if (allowedKeys && allowedKeys.indexOf("ticketId") < 0) allowedKeys.unshift("ticketId");
        var defaultsOn = Array.isArray(opts.columnDefaultsOn) ? opts.columnDefaultsOn : null;
        var slaOn = _slaOn();
        _state.cols = COLUMN_CATALOG
            .filter(function (c) { return slaOn || SLA_COL_KEYS.indexOf(c.key) < 0; })
            .filter(function (c) { return allowedKeys ? allowedKeys.indexOf(c.key) >= 0 : true; })
            .map(function (c) {
                var on = defaultsOn ? defaultsOn.indexOf(c.key) >= 0 : !!c.on;
                return { key: c.key, label: c.label, on: on, always: !!c.always };
            });
        _state.photos = { enabled: true };
        _renderWizard();
        var modal = document.getElementById("reportWizardModal");
        modal.classList.remove("hidden");
        modal.style.display = "flex";
    }

    function close() {
        var modal = document.getElementById("reportWizardModal");
        modal.classList.add("hidden");
        modal.style.display = "none";
        _state.running = false;
        _setBusy(false);
    }

    function _renderWizard() {
        var body = document.getElementById("reportWizardBody");
        var ctxLabel = (_state.opts && _state.opts.title) || "Issues Report";

        var srcHtml = _state.sources.map(function (s, idx) {
            var n = s.data.length;
            var disabled = n === 0;
            return ''
                + '<label class="flex items-center gap-3 p-2 rounded ' + (disabled ? "opacity-50" : "hover:bg-slate-800/60") + '">'
                + '  <input type="checkbox" data-rep-src="' + idx + '" ' + (s.enabled ? "checked" : "") + ' ' + (disabled ? "disabled" : "") + ' class="w-4 h-4">'
                + '  <span class="inline-block w-3 h-3 rounded-sm" style="background:rgb(' + s.color.join(",") + ')"></span>'
                + '  <span class="flex-1 text-sm">' + _esc(s.label) + '</span>'
                + '  <span class="text-xs text-slate-400">' + n + '</span>'
                + '</label>';
        }).join("");

        var colHtml = _state.cols.map(function (c, idx) {
            return ''
                + '<label class="flex items-center gap-2 p-1 ' + (c.always ? "opacity-60" : "hover:bg-slate-800/60 rounded") + '">'
                + '  <input type="checkbox" data-rep-col="' + idx + '" ' + (c.on ? "checked" : "") + ' ' + (c.always ? "disabled" : "") + ' class="w-4 h-4">'
                + '  <span class="text-xs">' + _esc(c.label) + (c.always ? ' <span class="text-[10px] text-slate-500">(required)</span>' : "") + '</span>'
                + '</label>';
        }).join("");

        body.innerHTML = ''
            + '<div>'
            + '  <h4 class="text-xs font-bold text-amber-300 uppercase tracking-wider mb-2">Title</h4>'
            + '  <input id="reportTitleInput" type="text" value="' + _esc(ctxLabel) + '" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-sm text-white">'
            + '</div>'
            + '<div>'
            + '  <h4 class="text-xs font-bold text-amber-300 uppercase tracking-wider mb-2">Sources</h4>'
            + '  <div class="space-y-1 border border-slate-700 rounded-lg p-2 bg-slate-900/40">' + srcHtml + '</div>'
            + '  <p class="text-[10px] text-slate-500 mt-1">Counts reflect the rows currently loaded on this page (filters already applied).</p>'
            + '</div>'
            // Advanced options — collapsed by default so the prompt only
            // surfaces the two decisions most operators care about (Title +
            // Sources). Power users can expand to override columns or turn
            // photos off.
            + '<details class="border border-slate-700 rounded-lg bg-slate-900/40">'
            + '  <summary class="cursor-pointer select-none px-3 py-2 text-xs font-bold text-amber-300 uppercase tracking-wider hover:bg-slate-800/60 rounded-lg">'
            + '    <i class="fas fa-sliders-h mr-1"></i>Advanced options'
            + '    <span class="text-[10px] font-normal text-slate-400 normal-case ml-2">columns &amp; photos</span>'
            + '  </summary>'
            + '  <div class="px-3 pb-3 pt-1 space-y-4">'
            + '    <div>'
            + '      <p class="text-[11px] text-slate-400 mb-2">Columns</p>'
            + '      <div class="grid grid-cols-2 gap-1">' + colHtml + '</div>'
            + '    </div>'
            + '    <div>'
            + '      <label class="flex items-center gap-2"><input id="reportPhotosOn" type="checkbox" checked class="w-4 h-4"><span class="text-sm">Include photos (inline thumbnails in each row)</span></label>'
            + '      <p class="text-[10px] text-slate-500 mt-1 ml-6">Photos are fetched server-side and may add a few seconds + a few MB to the file.</p>'
            + '    </div>'
            + '  </div>'
            + '</details>';

        // Wire toggles.
        body.querySelectorAll("[data-rep-src]").forEach(function (el) {
            el.addEventListener("change", function () {
                _state.sources[+el.getAttribute("data-rep-src")].enabled = el.checked;
            });
        });
        body.querySelectorAll("[data-rep-col]").forEach(function (el) {
            el.addEventListener("change", function () {
                _state.cols[+el.getAttribute("data-rep-col")].on = el.checked;
            });
        });
        document.getElementById("reportPhotosOn").addEventListener("change", function (e) {
            _state.photos.enabled = e.target.checked;
        });
    }

    function _setBusy(busy) {
        var prog = document.getElementById("reportProgress");
        var pBtn = document.getElementById("reportPreviewBtn");
        var dBtn = document.getElementById("reportDownloadBtn");
        if (prog) prog.classList.toggle("hidden", !busy);
        if (pBtn) { pBtn.disabled = busy; pBtn.classList.toggle("opacity-50", busy); pBtn.classList.toggle("cursor-not-allowed", busy); }
        if (dBtn) { dBtn.disabled = busy; dBtn.classList.toggle("opacity-50", busy); dBtn.classList.toggle("cursor-not-allowed", busy); }
        if (!busy) _progress("", 0);
    }
    function _progress(text, pct) {
        var t = document.getElementById("reportProgressText");
        var b = document.getElementById("reportProgressBar");
        if (t && text) t.textContent = text;
        if (b && typeof pct === "number") b.style.width = Math.max(0, Math.min(100, pct)) + "%";
    }

    // ----- PDF generation --------------------------------------------------

    async function _generate(action) {
        if (_state.running) return;
        if (!_featureOn()) { close(); return; }
        if (typeof window.jspdf === "undefined" || !window.jspdf.jsPDF) {
            alert("PDF library failed to load. Check your internet connection and try again.");
            return;
        }
        var enabled = _state.sources.filter(function (s) { return s.enabled && s.data.length > 0; });
        if (enabled.length === 0) {
            alert("Pick at least one source with data.");
            return;
        }
        // Map current wizard toggles back to the corresponding catalog
        // entries (since cols may be a subset of the catalog).
        var activeKeys = _state.cols.filter(function (c) { return c.on || c.always; }).map(function (c) { return c.key; });
        // The photos checkbox is the master switch — when it's off, drop
        // the photos column from the table too (otherwise we'd render
        // empty cells where the thumbs would have been).
        if (!_state.photos.enabled) {
            activeKeys = activeKeys.filter(function (k) { return k !== "photos"; });
        }
        var activeCols = COLUMN_CATALOG.filter(function (c) { return activeKeys.indexOf(c.key) >= 0; });
        if (activeCols.length === 0) { alert("Pick at least one column."); return; }

        _state.running = true;
        _setBusy(true);
        _progress("Building tables…", 5);

        try {
            // Landscape if many columns or any wide ones; A4 either way.
            var totalWidth = activeCols.reduce(function (a, c) { return a + c.width; }, 0);
            var landscape = totalWidth > 200 || activeCols.length > 7;
            var doc = new window.jspdf.jsPDF({ orientation: landscape ? "landscape" : "portrait", unit: "mm", format: "a4" });

            var titleText = (document.getElementById("reportTitleInput") || {}).value || "Issues Report";

            var headerBottomY = _drawTitleHeader(doc, titleText, enabled);
            _progress("Header ready", 15);

            // Pre-fetch all photos we'll need (deduped by file id) before
            // we lay out tables, so addImage calls are synchronous.
            var photoCache = {};
            if (_state.photos.enabled) {
                _progress("Fetching photos…", 20);
                photoCache = await _prefetchPhotos(enabled);
            }
            _progress("Rendering sections…", 60);

            for (var s = 0; s < enabled.length; s++) {
                var sectPct = 60 + Math.round(((s + 1) / enabled.length) * 30);
                _progress("Rendering: " + enabled[s].label + " (" + (s + 1) + "/" + enabled.length + ")", sectPct);
                // First section continues directly under the title header;
                // subsequent sections start on a fresh page.
                var sectionStartY;
                if (s === 0) {
                    sectionStartY = headerBottomY;
                } else {
                    doc.addPage();
                    sectionStartY = 10;
                }
                _drawSection(doc, enabled[s], activeCols, photoCache, sectionStartY);
            }

            _progress("Finalising…", 95);
            _drawFooters(doc);

            var fileBase = (titleText || "issues-report")
                .toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
            var stamp = new Date().toISOString().slice(0, 10);
            var fileName = (fileBase || "issues-report") + "-" + stamp + ".pdf";

            _progress("Done — opening file", 100);
            if (action === "download") {
                doc.save(fileName);
            } else {
                // Preview: open blob in a new tab. window.open from inside
                // the HtmlService iframe is reliable when triggered by a
                // user gesture (the click that started this generate).
                var blob = doc.output("blob");
                var url = URL.createObjectURL(blob);
                var w = window.open(url, "_blank");
                if (!w) {
                    // popup blocked — fall back to download.
                    doc.save(fileName);
                }
            }
        } catch (err) {
            console.error("Report failed:", err);
            alert("Report failed: " + (err && err.message ? err.message : err));
        } finally {
            _state.running = false;
            _setBusy(false);
        }
    }

    // Compact header drawn at the top of page 1. Returns the y coordinate
    // where the first section may start (so the list begins on page 1
    // instead of wasting a full cover page).
    function _drawTitleHeader(doc, titleText, enabled) {
        var pageW = doc.internal.pageSize.getWidth();

        // Top band — portal + title only (kept slim).
        doc.setFillColor(15, 23, 42); doc.rect(0, 0, pageW, 16, "F");
        doc.setTextColor(252, 211, 77); doc.setFontSize(8); doc.setFont("helvetica", "bold");
        doc.text("TA ISSUE REPORTING PORTAL", 14, 6.5);
        doc.setTextColor(255, 255, 255); doc.setFontSize(13);
        doc.text(titleText, 14, 13);

        // Meta line directly under the band — generated / by / source counts
        // / filters all collapsed into one line to save vertical space.
        var nowStr = new Date().toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" });
        var who = (window.IRP_USER && window.IRP_USER.email) ? window.IRP_USER.email : "";
        var counts = enabled.map(function (s) { return s.label + ": " + s.data.length; }).join("  \u2022  ");
        var note = (_state.opts && _state.opts.filtersAppliedSummary) || "";
        var metaParts = ["Generated: " + nowStr];
        if (who) metaParts.push("By: " + who);
        if (counts) metaParts.push(counts);
        if (note) metaParts.push("Filters: " + note);
        doc.setTextColor(71, 85, 105); doc.setFont("helvetica", "normal"); doc.setFontSize(8);
        doc.text(metaParts.join("  \u2014  "), 14, 21, { maxWidth: pageW - 28 });

        // Section content starts just below the meta line.
        return 26;
    }

    function _drawSection(doc, src, activeCols, photoCache, startY) {
        var pageW = doc.internal.pageSize.getWidth();
        var bandY = (typeof startY === "number") ? startY : 10;
        var tableY = bandY + 12;

        // Section band.
        doc.setFillColor(src.color[0], src.color[1], src.color[2]);
        doc.rect(10, bandY, pageW - 20, 8, "F");
        doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(11);
        doc.text(src.label.toUpperCase() + "  (" + src.data.length + ")", 14, bandY + 6);

        var head = [activeCols.map(function (c) { return c.label; })];
        var body = src.data.map(function (issue) {
            return activeCols.map(function (c) {
                var catEntry = COLUMN_CATALOG.find(function (cc) { return cc.key === c.key; });
                return catEntry ? String(catEntry.read(issue) || "") : "";
            });
        });

        // Pin a fixed width + minimum height on the photos column so the
        // inline thumbnails have room. Other columns stay auto-sized.
        var photoColW = INLINE_THUMB.perRowCap * INLINE_THUMB.w
                      + (INLINE_THUMB.perRowCap - 1) * INLINE_THUMB.gap
                      + 2 * INLINE_THUMB.pad;
        var columnStyles = {};
        activeCols.forEach(function (c, idx) {
            if (c.key === "photos") {
                columnStyles[idx] = {
                    cellWidth: photoColW,
                    minCellHeight: INLINE_THUMB.h + 2 * INLINE_THUMB.pad,
                    halign: "left",
                    valign: "top"
                };
            }
        });

        doc.autoTable({
            head: head, body: body,
            startY: tableY,
            theme: "grid",
            margin: { left: 10, right: 10 },
            styles: { fontSize: 8, cellPadding: 1.5, overflow: "linebreak", valign: "top" },
            headStyles: { fillColor: [30, 41, 59], textColor: [252, 211, 77], fontStyle: "bold", fontSize: 8 },
            alternateRowStyles: { fillColor: [248, 250, 252] },
            columnStyles: columnStyles,
            didParseCell: function (data) {
                if (data.section !== "body") return;
                var col = activeCols[data.column.index];
                if (!col) return;
                if (col.key === "severity") {
                    var v = String(data.cell.raw || "").toUpperCase();
                    var rgb = SEV_COLOR[v];
                    if (rgb) { data.cell.styles.textColor = rgb; data.cell.styles.fontStyle = "bold"; }
                }
                if (col.key === "breached" && String(data.cell.raw) === "Yes") {
                    data.cell.styles.textColor = [220, 38, 38];
                    data.cell.styles.fontStyle = "bold";
                }
                if (col.key === "photos") {
                    // Suppress text; thumbs are drawn in didDrawCell. Grow
                    // the row to fit the thumbnail grid.
                    var links = String(data.cell.raw || "").split("|").filter(Boolean);
                    data.cell.text = [""];
                    data.cell._photoLinks = links;
                    if (links.length) {
                        var perRow = INLINE_THUMB.perRowCap;
                        var rows = Math.ceil(links.length / perRow);
                        var needed = rows * INLINE_THUMB.h
                                   + (rows - 1) * INLINE_THUMB.gap
                                   + 2 * INLINE_THUMB.pad;
                        if (needed > (data.cell.styles.minCellHeight || 0)) {
                            data.cell.styles.minCellHeight = needed;
                        }
                    }
                }
            },
            didDrawCell: function (data) {
                if (data.section !== "body") return;
                var col = activeCols[data.column.index];
                if (!col || col.key !== "photos") return;
                if (!_state.photos.enabled) return;
                var links = data.cell._photoLinks ||
                    String(data.cell.raw || "").split("|").filter(Boolean);
                if (!links.length) return;
                var cellX = data.cell.x, cellY = data.cell.y;
                var cellW = data.cell.width;
                var perRow = Math.max(1, Math.min(
                    INLINE_THUMB.perRowCap,
                    Math.floor((cellW - 2 * INLINE_THUMB.pad + INLINE_THUMB.gap) / (INLINE_THUMB.w + INLINE_THUMB.gap))
                ));
                links.forEach(function (link, idx) {
                    var r = Math.floor(idx / perRow);
                    var c = idx % perRow;
                    var x = cellX + INLINE_THUMB.pad + c * (INLINE_THUMB.w + INLINE_THUMB.gap);
                    var y = cellY + INLINE_THUMB.pad + r * (INLINE_THUMB.h + INLINE_THUMB.gap);
                    var entry = photoCache[link];
                    if (entry && entry.dataUrl) {
                        try { doc.addImage(entry.dataUrl, entry.format || "JPEG", x, y, INLINE_THUMB.w, INLINE_THUMB.h, undefined, "FAST"); }
                        catch (e) { _drawMissing(doc, x, y, INLINE_THUMB.w, INLINE_THUMB.h); }
                    } else {
                        _drawMissing(doc, x, y, INLINE_THUMB.w, INLINE_THUMB.h);
                    }
                });
            },
            didDrawPage: function () { /* footer drawn later */ }
        });
    }

    function _drawMissing(doc, x, y, w, h) {
        doc.setDrawColor(203, 213, 225); doc.setFillColor(241, 245, 249);
        doc.rect(x, y, w, h, "FD");
        doc.setTextColor(148, 163, 184); doc.setFont("helvetica", "italic"); doc.setFontSize(7);
        doc.text("photo unavailable", x + w / 2, y + h / 2, { align: "center", baseline: "middle" });
    }

    function _drawFooters(doc) {
        var pages = doc.internal.getNumberOfPages();
        var pageW = doc.internal.pageSize.getWidth();
        var pageH = doc.internal.pageSize.getHeight();
        for (var p = 1; p <= pages; p++) {
            doc.setPage(p);
            doc.setFontSize(8); doc.setTextColor(148, 163, 184);
            doc.text("TA Issue Reporting Portal", 14, pageH - 6);
            doc.text("Page " + p + " / " + pages, pageW - 14, pageH - 6, { align: "right" });
        }
    }

    // ----- Photo prefetch --------------------------------------------------

    function _prefetchPhotos(enabled) {
        var unique = {};
        enabled.forEach(function (s) {
            s.data.forEach(function (i) {
                ((i.issue && i.issue.photoLinks) || []).forEach(function (link) {
                    if (link) unique[link] = true;
                });
            });
        });
        var links = Object.keys(unique);
        if (links.length === 0) return Promise.resolve({});

        var cache = {};
        var i = 0;
        function next() {
            if (i >= links.length) return Promise.resolve(cache);
            var link = links[i++];
            // Photo fetch occupies the 20-60% band of the overall progress.
            var pct = 20 + Math.round((i / links.length) * 40);
            _progress("Fetching photos… (" + i + " / " + links.length + ")", pct);
            return window.API.getReportPhotoB64(link, 800)
                .then(function (resp) {
                    if (resp && resp.success && resp.data && resp.data.b64) {
                        var mime = String(resp.data.mimeType || "image/jpeg").toLowerCase();
                        // jsPDF.addImage requires the format flag to match the
                        // bytes — passing "JPEG" for PNG data throws "Image
                        // format not supported" and the user sees "photo
                        // unavailable". Derive it from the mimeType so PNG,
                        // WEBP, etc. all render.
                        var fmt = mime.indexOf("png")  >= 0 ? "PNG"
                                : mime.indexOf("webp") >= 0 ? "WEBP"
                                : mime.indexOf("gif")  >= 0 ? "GIF"
                                : "JPEG";
                        cache[link] = {
                            dataUrl: "data:" + mime + ";base64," + resp.data.b64,
                            format:  fmt
                        };
                    } else {
                        cache[link] = { dataUrl: null, error: (resp && resp.error) || "fetch failed" };
                    }
                })
                .catch(function (err) { cache[link] = { dataUrl: null, error: String(err) }; })
                .then(next);
        }
        return next();
    }

    // ----- Public ----------------------------------------------------------

    window.IRP_REPORT = {
        open: open,
        close: close,
        _generate: _generate
    };
})();
</script>
