<script>
// Set once per page render: the absolute Web app URL, so client code can
// build same-app links like IRP_WEBAPP_URL + '?page=committee' instead of
// guessing a relative path (which 404s under Apps Script's /exec endpoint).
window.IRP_WEBAPP_URL = "<?= (function(){ try { return getWebAppUrl() || ''; } catch(e) { return ''; } })() ?>";
</script>
<script>
const API = {
    ENDPOINT: "https://script.google.com/macros/s/AKfycbzfqTrf8fR-cc1ESy3qY13lxc8e0_K4-DeGgRkc-uK22D-NxVvab2V4Gu6Ac-vw9L-Ixw/exec",

    get USES_APPS_SCRIPT() {
        return typeof google !== "undefined" &&
               typeof google.script !== "undefined" &&
               typeof google.script.run !== "undefined";
    },

    _user: null,

    setEndpoint(url) { this.ENDPOINT = url; },

    async whoAmI() {
        if (this._user && this._user.email) return this._user;
        if (typeof window !== "undefined" && window.IRP_USER && window.IRP_USER.email) {
            this._user = { email: window.IRP_USER.email, role: window.IRP_USER.role };
            return this._user;
        }
        if (this.USES_APPS_SCRIPT) {
            this._user = await new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).api_whoAmI();
            });
            return this._user;
        }
        this._user = { email: "", role: "UNKNOWN" };
        return this._user;
    },

    async call(action, data = {}) {
        const payload = data || {};
        let result;
        if (this.USES_APPS_SCRIPT) {
            result = await new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(err => reject(new Error(err && err.message ? err.message : String(err))))
                    .api_call(action, payload);
            });
        } else {
            const body = Object.assign({ action: action }, payload);
            const response = await fetch(this.ENDPOINT, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(body)
            });
            if (!response.ok) throw new Error("HTTP " + response.status);
            result = await response.json();
        }
        if (!result || result.success === false) {
            const msg = (result && result.error) || "Unknown API error";
            // Inline JSON in the message so the action + raw server reply are
            // visible without expanding the collapsed Object in DevTools.
            console.error("API Error", action, payload, "->", JSON.stringify(result));
            throw new Error(msg + " [action=" + action + "]");
        }
        return ("data" in result) ? result.data : result;
    },

    getPendingIssues()        { return this.call("getPendingIssues"); },
    approveIssue(ticketId)    { return this.call("approveIssue", { ticketId }); },
    rejectIssue(t, r)         { return this.call("rejectIssue", { ticketId: t, reason: r }); },
    getLiveIssues(f = "ALL")  { return this.call("getLiveIssues", { filterOption: f }); },
    getClosedIssues()         { return this.call("getClosedIssues"); },
    updateBuilderStatus(t, s, c = "", v = "", d = null) {
        return this.call("updateBuilderStatus", { ticketId: t, status: s, comment: c, vendor: v, closureDate: d });
    },
    closeIssue(t, r)          { return this.call("closeIssue", { ticketId: t, reason: r }); },
    reopenIssue(t, r)         { return this.call("reopenIssue", { ticketId: t, reason: r }); },
    getDashboardMetrics()     { return this.call("getDashboardMetrics"); },
    getFormResponses()        { return this.call("getFormResponses"); },
    getIssuesWithStatus()     { return this.call("getIssuesWithStatus"); },
    generateTicketId()        { return this.call("generateTicketId"); },
    approveIssueWithTicketId(o, n) { return this.call("approveIssueWithTicketId", { originalTicketId: o, newTicketId: n }); },
    syncFormResponses()       { return this.call("syncFormResponses"); },
    submitIssue(payload)      { return this.call("submitIssue", payload || {}); },
    addPhotosToIssue(ticketId, sheet, photos) { return this.call("addPhotosToIssue", { ticketId, sheet, photos }); },
    getReportPhotoB64(fileIdOrUrl, maxW)      { return this.call("getReportPhotoB64", { fileId: fileIdOrUrl, maxW: maxW || 1200 }); },
    getCategoryMaster()       { return this.call("getCategoryMaster"); },
    getClientConfig()         { return this.call("getClientConfig"); },
    diag()                    { return this.call("diag"); },

    signOut() {
        this._user = null;
        // Land on the PUBLIC (anonymous) deployment after Google logs the
        // user out — otherwise the continue= URL is the secure deployment
        // which immediately bounces back to Google's account chooser.
        var publicUrl = "";
        try {
            publicUrl = (window.IRP_CLIENT_CONFIG &&
                         window.IRP_CLIENT_CONFIG.tunables &&
                         window.IRP_CLIENT_CONFIG.tunables.PUBLIC_WEBAPP_URL) || "";
        } catch (e) { /* no client config available */ }
        const back = publicUrl || (typeof window !== "undefined" && window.IRP_WEBAPP_URL) || "/";
        const url  = "https://accounts.google.com/Logout?continue=" +
                     encodeURIComponent("https://appengine.google.com/_ah/logout?continue=" + back);
        if (typeof window !== "undefined") window.open(url, "_top");
    }
};

if (typeof window !== "undefined" && !window.IRP_USER) {
    window.IRP_USER = { email: "", role: "UNKNOWN" };
}
// Expose API on window so cross-script partials (e.g. pdf-report) can
// reach it without sharing the surrounding script-block scope.
if (typeof window !== "undefined") window.API = API;

// Shared brief title for issue rows/cards across all pages. Prefers the
// resident-supplied description (trimmed to one short line); falls back to
// "Category – Subcategory", then ticket id. Keep tickets in detail views.
window.briefTitle = function (issue) {
    if (!issue) return "";
    var raw = (issue.issueTitle ||
               (issue.issue && issue.issue.description) ||
               issue.description ||
               "").toString().trim();
    if (raw) {
        var firstLine = raw.split(/\r?\n/)[0].trim();
        var firstSentence = firstLine.split(/(?<=[.!?])\s+/)[0];
        var pick = (firstSentence && firstSentence.length <= 80) ? firstSentence : firstLine;
        if (pick.length > 80) pick = pick.slice(0, 77).replace(/\s+\S*$/, "") + "…";
        return pick;
    }
    var cat = (issue.issue && issue.issue.category) || issue.category || "";
    var sub = (issue.issue && issue.issue.subcategory) || issue.subcategory || "";
    if (cat || sub) return (cat || "Issue") + (sub ? " \u2013 " + sub : "");
    return issue.ticketId || "Issue";
};
</script>
