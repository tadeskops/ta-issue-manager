    <script>
        // === Auth (server-trusted via Google sign-in) ===
        // No client-typed email, no sessionStorage. window.IRP_USER is
        // populated from api_whoAmI(). The page is gated server-side by
        // Router.gs; this is a UX safety net for fetch-fallback mode.
        (async function ensureAuthorized() {
            try {
                const u = await API.whoAmI();
                window.IRP_USER = u;
                if (!u.email || u.role === 'UNKNOWN') {
                    location.href = 'index.html';
                    return;
                }
                // Committee members may view this page too (read-only intent).
                const el = document.getElementById('userEmail');
                if (el) el.textContent = u.email;
                // Draft Mode buffer is per-user (localStorage key includes
                // the email) so init happens as soon as we know who's here.
                try {
                    BuilderBatch.init(u.email);
                    renderDraftToggle();
                    renderBatchBar();
                } catch (bootErr) {
                    console.warn('BuilderBatch init failed:', bootErr);
                }
            } catch (e) {
                console.error('Auth check failed:', e);
                location.href = 'index.html';
            }
            // Load feature flags for optional UI gating.
            try {
                const cc = await API.getClientConfig();
                window.IRP_CLIENT_CONFIG = cc || { features: {}, tunables: {} };
            } catch (e) {
                console.warn('getClientConfig failed, using defaults:', e && e.message);
                window.IRP_CLIENT_CONFIG = { features: {}, tunables: {} };
            }
            if (((window.IRP_CLIENT_CONFIG.features) || {}).FEATURE_PDF_REPORT === true) {
                const btn = document.getElementById('exportReportBtn');
                if (btn) btn.classList.remove('hidden');
            }
            try {
                const _t = (window.IRP_CLIENT_CONFIG.tunables) || {};
                const _u = _t.FULL_REPORT_PUBLIC_URL || '';
                if (_u) {
                    const a = document.getElementById('fullReportBtn');
                    if (a) { a.href = _u; a.classList.remove('hidden'); }
                }
            } catch (e) { /* non-fatal */ }
            // Strip SLA UI when FEATURE_SLA is off.
            if (((window.IRP_CLIENT_CONFIG.features) || {}).FEATURE_SLA !== true) {
                const slaCard = document.getElementById('kpiBreaches');
                if (slaCard) {
                    const card = slaCard.closest('.premium-card');
                    if (card) card.remove();
                }
                // Rebalance the KPI grid: 3 cards → md:grid-cols-3 (no
                // empty 4th column). Committee dashboard has tabs so it
                // never hits this branch; here we own the layout.
                const kpiGrid = document.getElementById('kpiGrid');
                if (kpiGrid) {
                    kpiGrid.classList.remove('md:grid-cols-4');
                    kpiGrid.classList.add('md:grid-cols-3');
                }
                const slaTh = document.querySelector('table thead th:nth-child(8)');
                if (slaTh && /SLA/i.test(slaTh.textContent || '')) slaTh.remove();
            }
        })();

        function __slaOn() {
            var f = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.features) || {};
            return f.FEATURE_SLA === true;
        }

        let allIssues = [];
        let currentTicketId = null;
        let builderStatusFilter = '';
        let builderDateFilter = 'ALL';
        // Grid sort order — shares the SORT_ORDER catalog with the PDF
        // report partial (pdf-report.html) so on-screen ordering matches
        // the exported report when both use their defaults. Default is
        // severity worst-first (Critical → High → Medium → Low → blank).
        let issuesSort = 'severity-desc';
        // Auto-refresh toggle, mirrored from committee dashboard so
        // builders get the same control (pause while updating a status
        // in the modal, resume when done). Silent refreshes suppress
        // the "Data refreshed!" toast to avoid noise.
        let autoRefreshEnabled = true;
        let autoRefreshInterval = null;

        // Which cards are currently expanded. Refreshes rebuild
        // `#issuesGrid.innerHTML` which would otherwise collapse every
        // open card; renderIssuesTable() re-applies expanded state
        // from this Set after painting. Also survives filter changes.
        const expandedCards = new Set();

        // === Draft Mode / batch buffer =================================
        //
        // Per-user localStorage buffer for pending status updates. When
        // Draft Mode is ON, confirmStatusUpdate() stages an entry here
        // instead of calling the API immediately; the batchBar shows
        // the count with Save / Discard controls. saveBuilderBatch()
        // flushes all entries via a single server commitBatch({op:
        // 'update_status'...}) call under one ScriptLock so partial
        // network failures can't leave the sheet half-written.
        //
        // Storage key intentionally scoped by user email so two
        // builders sharing a browser profile don't clobber each other.
        const BuilderBatch = (() => {
            const KEY_PREFIX = 'IRP_BUILDER_BATCH_v1:';
            const DRAFT_KEY_PREFIX = 'IRP_BUILDER_DRAFT_ON_v1:';
            let email = '';
            let items = [];        // {ticketId, status, vendor, comment, prevStatus, prevVendor, prevComment, stagedAt}
            let enabled = false;

            function _key()      { return KEY_PREFIX      + (email || '_'); }
            function _draftKey() { return DRAFT_KEY_PREFIX + (email || '_'); }
            function _persist() {
                try { localStorage.setItem(_key(), JSON.stringify(items)); } catch (e) { /* quota */ }
            }
            function _restore() {
                try {
                    const raw = localStorage.getItem(_key());
                    items = raw ? (JSON.parse(raw) || []) : [];
                } catch (e) { items = []; }
                try {
                    enabled = localStorage.getItem(_draftKey()) === '1';
                } catch (e) { enabled = false; }
            }
            return {
                init(userEmail) {
                    email = (userEmail || '').toLowerCase();
                    _restore();
                },
                isEnabled() { return enabled; },
                setEnabled(v) {
                    enabled = !!v;
                    try { localStorage.setItem(_draftKey(), enabled ? '1' : '0'); } catch (e) { /* noop */ }
                },
                // Add or replace the staged entry for a ticket. Only one
                // entry per ticket — the most recent value wins.
                stage(entry) {
                    if (!entry || !entry.ticketId) return;
                    const now = new Date().toISOString();
                    const existing = items.findIndex(i => i.ticketId === entry.ticketId);
                    const rec = Object.assign({}, entry, { stagedAt: now });
                    if (existing >= 0) items[existing] = rec;
                    else items.push(rec);
                    _persist();
                },
                unstage(ticketId) {
                    items = items.filter(i => i.ticketId !== ticketId);
                    _persist();
                },
                get(ticketId) { return items.find(i => i.ticketId === ticketId) || null; },
                has(ticketId) { return !!items.find(i => i.ticketId === ticketId); },
                list() { return items.slice(); },
                count() { return items.length; },
                clear() { items = []; _persist(); },
                // Post-save cleanup: keep only entries whose ticketId is
                // in `failedIds` so the user can retry just those.
                keepOnly(failedIds) {
                    const keep = new Set((failedIds || []).map(String));
                    items = items.filter(i => keep.has(String(i.ticketId)));
                    _persist();
                }
            };
        })();

        function toggleDraftMode() {
            const next = !BuilderBatch.isEnabled();
            BuilderBatch.setEnabled(next);
            renderDraftToggle();
            renderBatchBar();
            renderIssuesTable();
            showToast(next
                ? 'Draft Mode ON — status updates will be staged until you Save Changes'
                : 'Draft Mode OFF — status updates commit immediately',
                'success');
        }

        function renderDraftToggle() {
            const btn = document.getElementById('draftModeToggle');
            const lbl = document.getElementById('draftModeLabel');
            if (!btn || !lbl) return;
            const on = BuilderBatch.isEnabled();
            lbl.textContent = on ? 'Draft Mode: ON' : 'Draft Mode';
            // Match committee-dashboard's toggle: same base classes, only
            // the fill/border/icon shift when Draft Mode is ON. Amber-gold
            // matches the page's primary accent (Refresh button gradient).
            btn.className = 'px-3 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border transition-all whitespace-nowrap ' +
                (on
                    ? 'bg-amber-600/80 hover:bg-amber-500 text-white border-amber-400/60'
                    : 'bg-slate-700/40 hover:bg-slate-700/60 text-slate-200 border-slate-500/40');
            const icon = btn.querySelector('i');
            if (icon) icon.className = 'fas ' + (on ? 'fa-toggle-on' : 'fa-toggle-off') + ' mr-1.5';
        }

        function renderBatchBar() {
            const bar = document.getElementById('batchBar');
            if (!bar) return;
            const n = BuilderBatch.count();
            const on = BuilderBatch.isEnabled();
            if (!on || n === 0) { bar.classList.add('hidden'); return; }
            bar.classList.remove('hidden');
            const cnt = document.getElementById('batchCount');
            const plu = document.getElementById('batchPlural');
            if (cnt) cnt.textContent = String(n);
            if (plu) plu.textContent = n === 1 ? '' : 's';
        }

        async function saveBuilderBatch() {
            const staged = BuilderBatch.list();
            if (staged.length === 0) return;
            const saveBtn = document.getElementById('batchSaveBtn');
            const discardBtn = document.getElementById('batchDiscardBtn');
            if (saveBtn) saveBtn.disabled = true;
            if (discardBtn) discardBtn.disabled = true;
            try {
                const payload = staged.map(s => ({
                    op: 'update_status',
                    ticketId: s.ticketId,
                    status: s.status,
                    comment: s.comment || '',
                    vendor: s.vendor || ''
                }));
                const res = await API.call('commitBatch', { items: payload });
                const results = (res && res.results) || [];
                const okCount = (res && typeof res.okCount === 'number')
                    ? res.okCount
                    : results.filter(r => r.success).length;
                const failed = results.filter(r => !r.success);
                // Keep only failed entries in the buffer so the user can retry.
                BuilderBatch.keepOnly(failed.map(f => f.ticketId));
                if (failed.length === 0) {
                    showToast('✓ Saved ' + okCount + ' update' + (okCount === 1 ? '' : 's'), 'success');
                } else {
                    showToast('⚠ Saved ' + okCount + ', ' + failed.length + ' failed — kept in buffer', 'warning');
                    console.warn('commitBatch failures:', failed);
                }
                await loadData({ silent: true });
            } catch (e) {
                showToast('✕ Batch save failed: ' + (e && e.message || e), 'error');
                console.error('saveBuilderBatch error:', e);
            } finally {
                if (saveBtn) saveBtn.disabled = false;
                if (discardBtn) discardBtn.disabled = false;
                renderBatchBar();
                renderIssuesTable();
            }
        }

        function discardBuilderBatch() {
            const n = BuilderBatch.count();
            if (n === 0) return;
            if (!confirm('Discard ' + n + ' staged update' + (n === 1 ? '' : 's') + '?')) return;
            BuilderBatch.clear();
            renderBatchBar();
            renderIssuesTable();
            showToast('Discarded ' + n + ' staged update' + (n === 1 ? '' : 's'), 'success');
        }

        function undoStagedBuilder(ticketId) {
            BuilderBatch.unstage(ticketId);
            renderBatchBar();
            renderIssuesTable();
        }
        // ===============================================================

        // Populate a Sort dropdown from the shared SORT_ORDER catalog
        // exposed by pdf-report.html. Falls back to a minimal severity
        // toggle if the report partial hasn't loaded yet.
        function _populateSortSelect(id, current) {
            const sel = document.getElementById(id);
            if (!sel) return;
            const opts = (window.IRP_REPORT && Array.isArray(window.IRP_REPORT.SORT_ORDER))
                ? window.IRP_REPORT.SORT_ORDER
                : [
                    { key: 'severity-desc', label: 'Severity: Critical → Low (default)' },
                    { key: 'severity-asc',  label: 'Severity: Low → Critical' }
                  ];
            sel.innerHTML = opts.map(o =>
                '<option value="' + o.key + '"' + (o.key === current ? ' selected' : '') + '>' + o.label + '</option>'
            ).join('');
        }

        function setIssuesSort(v) { issuesSort = String(v || 'severity-desc'); renderIssuesTable(); }

        // Sort a shallow copy of `list` via the shared catalog. Contained
        // fallback so a missing partial never breaks the grid.
        function _sortIssues(list, key) {
            if (window.IRP_REPORT && typeof window.IRP_REPORT.sortIssuesByChoice === 'function') {
                return window.IRP_REPORT.sortIssuesByChoice(list, key);
            }
            const RANK = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
            const rank = i => {
                const r = RANK[String(((i || {}).issue || {}).severity || '').toUpperCase()];
                return r == null ? 999 : r;
            };
            const arr = (list || []).slice();
            arr.sort((a, b) => (key === 'severity-asc' ? rank(b) - rank(a) : rank(a) - rank(b)));
            return arr;
        }

        // Returns true when the issue's dateReported falls inside the chosen
        // window. range is 'ALL' (no filter) or a day-count string ('7','30','90').
        function passesDateFilter(issue, range) {
            if (!range || range === 'ALL') return true;
            const days = parseInt(range, 10);
            if (!days || isNaN(days)) return true;
            const d = issue && issue.dateReported ? new Date(issue.dateReported) : null;
            if (!d || isNaN(d.getTime())) return false;
            return (Date.now() - d.getTime()) <= days * 24 * 60 * 60 * 1000;
        }

        document.getElementById('userEmail').textContent = (window.IRP_USER && window.IRP_USER.email) || '…';

        // (Initial load is triggered at the bottom of this script after
        // all helpers are defined; see _populateSortSelect + loadData
        // call there. Removed the duplicate 'load' listener that used
        // to fire loadData twice.)

        // Auto-update character count
        document.getElementById('workComment').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        // Normalize data to nested structure
        function normalizeIssueData(data) {
            if (!data) return null;
            // If already normalized, return as-is
            if (data.resident && typeof data.resident === 'object' && data.location && typeof data.location === 'object') {
                return data;
            }
            // Normalize flat structure to nested
            return {
                ticketId: data.ticketId || data.ticketID || '',
                resident: {
                    name: data.resident?.name || data.residentName || '',
                    email: data.resident?.email || data.residentEmail || '',
                    phone: data.resident?.phone || data.residentPhone || ''
                },
                location: {
                    tower: data.location?.tower || data.tower || '',
                    flat: data.location?.flat || data.flatNumber || data.flat || ''
                },
                issue: {
                    category: data.issue?.category || data.category || '',
                    subcategory: data.issue?.subcategory || data.subCategory || '',
                    severity: data.issue?.severity || data.severity || '',
                    description: data.issue?.description || data.description || ''
                },
                status: data.status || 'ASSIGNED',
                dateReported: data.dateReported || '',
                builder: data.builder || { status: 'ASSIGNED' },
                sla: data.sla || { daysRemaining: 0, breached: false }
            };
        }

        async function loadData(opts) {
            const silent = !!(opts && opts.silent);
            // Guard: don't blow away the Update Status modal while the
            // builder is filling it out. The modal is a discrete UI so
            // a simple "modal open?" check suffices — no need for the
            // per-textarea edit set the committee dashboard uses.
            const statusModalOpen = !document.getElementById('statusModal').classList.contains('hidden');
            if (statusModalOpen) {
                if (silent) {
                    console.debug('builder: auto-refresh skipped, status modal is open');
                } else {
                    showToast('Refresh paused — close the Update Status modal first', 'warning');
                }
                return;
            }
            try {
                const liveP   = API.getLiveIssues('BUILDER');
                const closedP = API.getClosedIssues();
                const [issues, closed] = await Promise.all([liveP, closedP]);
                const live = (issues || []).map(normalizeIssueData);
                // Closed issues come from CLOSED_ISSUES sheet; show them
                // alongside live ones so the "Work Completed" filter reflects
                // both committee-closed tickets and builder-marked completions.
                const closedNorm = (closed || []).map(normalizeIssueData).map(i => {
                    i.builder = i.builder || {};
                    i.builder.status = 'WORK_COMPLETED';
                    return i;
                });
                allIssues = live.concat(closedNorm);

                renderIssuesTable();
                updateKPIs();
                if (!silent) showToast('✓ Data refreshed!', 'success');
            } catch (error) {
                // Surface the real error instead of silently swapping in
                // mock data — fake rows hide backend/permission failures
                // and make it look like the dashboard "works" with fake
                // content. Match committee-dashboard error semantics.
                console.error('Builder dashboard load failed:', error);
                allIssues = [];
                renderIssuesTable();
                updateKPIs();

                const msg = (error && error.message) || String(error);
                let hint = '';
                if (/permission|not have access|denied|openById|cannot open the issues spreadsheet|cannot access spreadsheet/i.test(msg)) {
                    hint = ' — your Google account may not have access to the spreadsheet. Ask the admin to run syncRoleAccessNow() (or share the issues sheet with you as Viewer).';
                }
                showToast('Could not load issues: ' + msg + hint, 'error');
            }
            // Batch bar is driven by localStorage, not by fetched data,
            // so it must survive a failed load too.
            try { renderBatchBar(); } catch (e) { /* noop */ }
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            document.getElementById('refreshStatus').textContent = autoRefreshEnabled ? 'AUTO' : 'OFF';
            const icon = document.getElementById('refreshIcon');
            if (icon) icon.style.animation = autoRefreshEnabled ? 'spin 2s linear infinite' : 'none';
            if (autoRefreshEnabled) {
                autoRefreshInterval = setInterval(() => loadData({ silent: true }), 30000);
                showToast('✓ Auto-refresh enabled', 'success');
            } else {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                showToast('✗ Auto-refresh disabled', 'success');
            }
        }

        function toggleIssueCard(ticketId, ev) {
            if (ev && ev.stopPropagation) ev.stopPropagation();
            const safe = ticketId.replace(/[^A-Za-z0-9_-]/g, '_');
            const content = document.querySelector(`.issue-content-${safe}`);
            const icon    = document.querySelector(`.toggle-icon-${safe}`);
            if (!content || !icon) return;
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                icon.style.transform = 'rotate(0deg)';
                expandedCards.delete(ticketId);
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = 'rotate(180deg)';
                expandedCards.add(ticketId);
            }
        }

        // Re-open every card that was expanded before the last render.
        // Called at the end of renderIssuesTable() so an auto-refresh
        // (or a filter change) never collapses cards the user is
        // actively reading.
        function _restoreExpandedCards() {
            expandedCards.forEach(ticketId => {
                const safe = ticketId.replace(/[^A-Za-z0-9_-]/g, '_');
                const content = document.querySelector(`.issue-content-${safe}`);
                const icon = document.querySelector(`.toggle-icon-${safe}`);
                if (!content || !icon) return;
                // scrollHeight is 0 before layout in some engines; a
                // large max value keeps CSS transitions intact while
                // ensuring the panel is fully open.
                content.style.maxHeight = (content.scrollHeight || 9999) + 'px';
                icon.style.transform = 'rotate(180deg)';
            });
        }

        function renderIssuesTable() {
            const grid = document.getElementById('issuesGrid');
            const filteredRaw = allIssues.filter(i => {
                if (builderStatusFilter && String(i.builder.status || 'ASSIGNED').toUpperCase() !== builderStatusFilter) return false;
                return passesDateFilter(i, builderDateFilter);
            });
            const filtered = _sortIssues(filteredRaw, issuesSort);
            if (!filtered || filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full p-6 text-center text-slate-500">No issues to show</div>';
                return;
            }

            const slaOn = __slaOn();
            grid.innerHTML = filtered.map(issue => {
                const ticketId = issue.ticketId;
                const safeId = ticketId.replace(/[^A-Za-z0-9_-]/g, '_');
                // Check whether this ticket has a Draft Mode pending
                // update. When staged, the row is rendered with an
                // amber "Will change to X" preview pill and the Update
                // Status button is replaced with Undo so the builder
                // can back out before flushing the batch.
                const staged = BuilderBatch.get(ticketId);
                const statusColor = getStatusColor(issue.builder.status);
                const sevColor = getSeverityColor(issue.issue.severity);
                const breached = slaOn && issue.sla && issue.sla.breached;
                const desc = issue.issue.description || 'No description provided';
                const date = issue.dateReported ? new Date(issue.dateReported).toLocaleDateString() : '—';
                const status = issue.builder.status || 'ASSIGNED';

                const sevBadge   = `<span class="px-2.5 py-1 rounded-full text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider whitespace-nowrap shadow" style="background-color: ${sevColor}">${issue.issue.severity}</span>`;
                const statePill  = `<span class="px-2.5 py-1 rounded-full text-white text-[10px] sm:text-xs font-bold whitespace-nowrap uppercase tracking-wider shadow" style="background-color: ${statusColor}">${status}</span>`;
                const stagedPill = staged
                    ? `<span class="px-2.5 py-1 rounded-full text-[10px] sm:text-xs font-bold whitespace-nowrap uppercase tracking-wider shadow bg-amber-500/90 text-slate-900 border border-amber-300" title="Staged for next Save Changes"><i class="fas fa-hourglass-half mr-1"></i>Will → ${staged.status}</span>`
                    : '';
                const chevron    = `<button onclick="toggleIssueCard('${ticketId}', event)" class="w-7 h-7 inline-flex items-center justify-center rounded-lg bg-slate-700/50 hover:bg-slate-600/60 text-amber-300 transition-colors flex-shrink-0" title="Expand"><i class="fas fa-chevron-down toggle-icon-${safeId} transition-transform" style="transform: rotate(0deg)"></i></button>`;

                const updateBtn = staged
                    ? `<button onclick="undoStagedBuilder('${ticketId}')" class="px-3 py-1.5 inline-flex items-center gap-1.5 rounded-lg text-xs font-bold bg-amber-600 hover:bg-amber-500 text-white transition-colors shadow" title="Remove this update from the draft buffer"><i class="fas fa-rotate-left"></i><span>Undo Staged</span></button>`
                    : `<button onclick="openStatusModal('${ticketId}')" class="px-3 py-1.5 inline-flex items-center gap-1.5 rounded-lg text-xs font-bold bg-orange-600 hover:bg-orange-500 text-white transition-colors shadow"><i class="fas fa-edit"></i><span>Update Status</span></button>`;
                const viewBtn   = `<button onclick="openDetailsModal('${ticketId}')" class="px-3 py-1.5 inline-flex items-center gap-1.5 rounded-lg text-xs font-bold bg-cyan-600 hover:bg-cyan-500 text-white transition-colors shadow"><i class="fas fa-eye"></i><span>View Details</span></button>`;

                // Staged preview block, shown only when Draft Mode
                // captured pending changes for this ticket. Renders
                // vendor / comment overrides so the builder can verify
                // before Save Changes.
                const stagedPreview = staged
                    ? `<div class="border border-amber-400/50 bg-amber-500/10 rounded-lg p-3">
                            <p class="text-[10px] text-amber-300 uppercase tracking-wider font-bold mb-1">
                                <i class="fas fa-pen-nib mr-1"></i>Draft (unsaved)
                            </p>
                            <p class="text-sm text-amber-100"><strong>New status:</strong> ${staged.status}</p>
                            ${staged.vendor ? `<p class="text-sm text-amber-100"><strong>Vendor:</strong> ${staged.vendor}</p>` : ''}
                            ${staged.comment ? `<p class="text-sm text-amber-100 whitespace-pre-wrap"><strong>Comment:</strong> ${staged.comment}</p>` : ''}
                            <p class="text-[10px] text-amber-300/80 mt-1">Staged ${new Date(staged.stagedAt).toLocaleTimeString()} — will commit on Save Changes.</p>
                        </div>`
                    : '';

                const slaRow = (slaOn && issue.sla)
                    ? `<div>
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider gold-accent">SLA Remaining</p>
                            <p class="font-semibold text-sm ${breached ? 'text-red-300' : 'text-emerald-300'}">
                                <i class="fas ${breached ? 'fa-triangle-exclamation' : 'fa-shield-halved'} mr-1"></i>${issue.sla.daysRemaining}d ${breached ? '(breached)' : ''}
                            </p>
                        </div>`
                    : '';

                // Inline thumbnails next to the description so vendors see
                // photos at-a-glance from the list. Click to enlarge in the
                // shared lightbox; falls back to Drive on broken fileIds.
                const photoLinks = (issue.issue && Array.isArray(issue.issue.photoLinks)) ? issue.issue.photoLinks : [];
                const photosBlock = photoLinks.length ? `
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-wider gold-accent mb-1.5">
                            <i class="fas fa-paperclip mr-1"></i>Photos (${photoLinks.length})
                        </p>
                        <div class="flex flex-wrap gap-2">
                            ${photoLinks.map((link, idx) => {
                                const fileId = extractDriveFileId(link);
                                const thumb = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w400` : link;
                                const viewer = fileId ? `https://drive.google.com/file/d/${fileId}/view` : link;
                                return `
                                    <a href="${viewer}" target="_blank" rel="noopener noreferrer"
                                       onclick="event.preventDefault(); event.stopPropagation(); openPhotoLightbox('${fileId || ''}', '${viewer}')"
                                       class="group relative block rounded-md overflow-hidden border border-slate-600/40 hover:border-amber-400/60 bg-slate-800/40 transition-all w-20 h-20 cursor-zoom-in flex-shrink-0"
                                       title="Click to enlarge">
                                        <img src="${thumb}" alt="Photo ${idx + 1}" loading="lazy"
                                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-200"
                                             onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-slate-500 text-[10px] p-1 text-center\\'><i class=\\'fas fa-file-image\\'></i></div>'">
                                    </a>`;
                            }).join('')}
                        </div>
                    </div>` : '';

                return `
                    <div class="premium-card rounded-xl overflow-hidden border ${staged ? 'border-amber-400/70 bg-amber-950/10 ring-1 ring-amber-400/30' : (breached ? 'border-red-700/40 bg-red-950/10' : 'border-slate-700 hover:border-amber-500/50')} transition-all issue-row" id="row-${ticketId}" style="border-left: 3px solid transparent;">
                        <!-- COLLAPSED HEADER: title + status + severity + chevron + meta sub-row -->
                        <div class="bg-gradient-to-r from-slate-800/30 to-slate-700/20 px-4 py-3 cursor-pointer hover:bg-slate-800/40 transition-colors" onclick="toggleIssueCard('${ticketId}', event)">
                            <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3">
                                <h3 class="text-sm sm:text-base font-bold text-slate-100 leading-snug sm:flex-1 min-w-0 break-words">${window.titleWithTicketId(issue)}</h3>
                                <div class="flex items-center gap-1.5 flex-shrink-0 self-end sm:self-auto flex-wrap">
                                    ${stagedPill}
                                    ${statePill}
                                    ${sevBadge}
                                    ${chevron}
                                </div>
                            </div>
                            <p class="mt-1.5 text-[11px] text-slate-400 flex flex-wrap items-center gap-x-3 gap-y-0.5">
                                <span title="Location"><i class="fas fa-building mr-1 text-slate-500"></i>${issue.location.tower || '—'}${issue.location.flat ? ' / ' + issue.location.flat : ''}</span>
                                <span class="text-slate-600">·</span>
                                <span title="Category"><i class="fas fa-folder mr-1 text-slate-500"></i>${issue.issue.category || '—'}</span>
                                <span class="text-slate-600">·</span>
                                <span title="Resident"><i class="fas fa-user mr-1 text-slate-500"></i>${issue.resident.name || '—'}</span>
                                <span class="text-slate-600">·</span>
                                <span title="Date reported"><i class="fas fa-calendar-day mr-1 text-slate-500"></i>${date}</span>
                            </p>
                        </div>

                        <!-- EXPANDED BODY: description + optional SLA + actions -->
                        <div class="issue-content-${safeId} max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                            <div class="p-4 space-y-3 bg-slate-900/30 border-t gold-border">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-wider gold-accent mb-1.5">
                                        <i class="fas fa-align-left mr-1"></i>Description
                                    </p>
                                    <p class="text-slate-300 text-sm leading-relaxed bg-slate-800/30 rounded-lg p-3 border border-slate-700/50">${desc}</p>
                                </div>
                                ${stagedPreview}
                                ${photosBlock}
                                ${slaRow ? `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${slaRow}</div>` : ''}
                                <div class="pt-3 border-t border-slate-700/50">
                                    <p class="text-[10px] text-slate-400 uppercase tracking-wider gold-accent mb-2">
                                        <i class="fas fa-bolt mr-1"></i>Actions
                                    </p>
                                    <div class="flex flex-wrap items-center gap-2">
                                        ${updateBtn}
                                        ${viewBtn}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Prune expandedCards entries whose tickets are no longer
            // in the filtered view, then re-open the rest — this is
            // what keeps expanded cards from collapsing during a
            // 30 s auto-refresh or a status-filter change.
            const visible = new Set(filtered.map(f => f.ticketId));
            expandedCards.forEach(id => { if (!visible.has(id)) expandedCards.delete(id); });
            _restoreExpandedCards();
        }

        function updateKPIs() {
            const assigned = allIssues.filter(i => i.builder.status === 'ASSIGNED').length;
            const inProgress = allIssues.filter(i => i.builder.status === 'IN_PROGRESS').length;
            const completed = allIssues.filter(i => i.builder.status === 'WORK_COMPLETED').length;

            document.getElementById('kpiAssigned').textContent = assigned;
            document.getElementById('kpiInProgress').textContent = inProgress;
            document.getElementById('kpiCompleted').textContent = completed;
            const breachesEl = document.getElementById('kpiBreaches');
            if (breachesEl) {
                breachesEl.textContent = allIssues.filter(i => i.sla && i.sla.breached).length;
            }
        }

        function getSeverityColor(severity) {
            const colors = {
                'CRITICAL': '#dc2626',
                'HIGH':     '#ea580c',
                'MEDIUM':   '#eab308',
                'LOW':      '#6b7280'
            };
            return colors[String(severity || '').toUpperCase()] || '#6b7280';
        }

        function getStatusColor(status) {
            const colors = {
                'ASSIGNED': '#3b82f6',
                'IN_PROGRESS': '#eab308',
                'WORK_COMPLETED': '#10b981'
            };
            return colors[status] || '#6b7280';
        }

        function openStatusModal(ticketId) {
            const issue = allIssues.find(i => i.ticketId === ticketId);
            currentTicketId = ticketId;

            document.getElementById('statusModalDetails').innerHTML = `
                <p><strong>Ticket ID:</strong> ${issue.ticketId}</p>
                <p><strong>Resident:</strong> ${issue.resident.name}</p>
                <p><strong>Location:</strong> ${issue.location.tower}/${issue.location.flat}</p>
                <p><strong>Category:</strong> ${issue.issue.category}</p>
                <p><strong>Description:</strong> ${issue.issue.description}</p>
                <p><strong>Severity:</strong> ${issue.issue.severity}</p>
            `;

            document.getElementById('currentStatusDisplay').textContent = issue.builder.status || 'ASSIGNED';
            // If this ticket already has a staged Draft Mode entry,
            // pre-fill the form with those pending values so editing
            // the draft is friction-free.
            const staged = BuilderBatch.get(ticketId);
            const preStatus  = (staged && staged.status)  || '';
            const preVendor  = (staged && staged.vendor)  || issue.builder.assignedVendor || '';
            const preComment = (staged && staged.comment) || issue.builder.comment || '';
            document.getElementById('newStatus').value = preStatus;
            document.getElementById('vendorName').value = preVendor;
            document.getElementById('workComment').value = preComment;
            document.getElementById('charCount').textContent = preComment.length;

            document.getElementById('statusModal').classList.remove('hidden');
        }

        async function confirmStatusUpdate() {
            const newStatus = document.getElementById('newStatus').value;
            const vendor = document.getElementById('vendorName').value.trim();
            const comment = document.getElementById('workComment').value.trim();

            if (!newStatus) {
                showToast('✕ Please select a new status', 'error');
                return;
            }

            if (!comment) {
                showToast('✕ Please add a work comment', 'error');
                return;
            }

            // Draft Mode: stage locally, close modal, refresh grid so
            // the amber preview pill appears without hitting the API.
            // The batch is flushed later via Save Changes.
            if (BuilderBatch.isEnabled()) {
                BuilderBatch.stage({
                    ticketId: currentTicketId,
                    status: newStatus,
                    vendor: vendor,
                    comment: comment
                });
                closeModal('statusModal');
                renderBatchBar();
                renderIssuesTable();
                showToast('✓ Update staged — click Save Changes to commit', 'success');
                return;
            }

            try {
                await API.updateBuilderStatus(currentTicketId, newStatus, comment, vendor);
                closeModal('statusModal');
                showToast('✓ Status updated successfully!', 'success');
                loadData({ silent: true });
            } catch (error) {
                showToast('✕ Error: ' + error.message, 'error');
            }
        }

        function openDetailsModal(ticketId) {
            const issue = allIssues.find(i => i.ticketId === ticketId);
            if (!issue) return;

            const statusTime = issue.builder && issue.builder.lastUpdated
                ? new Date(issue.builder.lastUpdated).toLocaleDateString('en-IN')
                : '—';
            const daysOpen = Math.floor((new Date() - new Date(issue.dateReported)) / (1000 * 60 * 60 * 24));
            const slaOn = __slaOn();
            const breached = slaOn && issue.sla && issue.sla.breached;
            const statusColor = getStatusColor(issue.builder.status);

            // Mirrors committee's openDetailedView layout: flat sections
            // separated by border-t dividers, uppercase caption labels
            // above every value, single-column typography for scannability.
            let detailedContent = `
                <div class="space-y-5">
                    <!-- Header: Ticket ID & Severity -->
                    <div class="flex justify-between items-baseline">
                        <div>
                            <p class="text-xs text-slate-400 mb-1">TICKET ID</p>
                            <p class="text-2xl font-bold text-blue-300 font-mono">${issue.ticketId}</p>
                        </div>
                        <span class="px-3 py-1 rounded text-white text-sm font-bold" style="background-color: ${getSeverityColor(issue.issue.severity)}">${issue.issue.severity}</span>
                    </div>

                    <!-- Basic Info -->
                    <div class="space-y-3 border-t border-slate-700 pt-4">
                        <div>
                            <p class="text-xs text-slate-400 mb-1">RESIDENT</p>
                            <p class="text-slate-100 text-sm">${issue.resident.name || '—'}</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 mb-1">LOCATION</p>
                            <p class="text-slate-100 text-sm">${issue.location.tower || '—'}${issue.location.flat ? ' / Flat ' + issue.location.flat : ''}</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 mb-1">CATEGORY</p>
                            <p class="text-slate-100 text-sm">${issue.issue.category || '—'}${issue.issue.subcategory ? ' • ' + issue.issue.subcategory : ''}</p>
                        </div>
                    </div>

                    <!-- Timeline Info -->
                    <div class="grid grid-cols-3 gap-3 border-t border-slate-700 pt-4">
                        <div class="text-center">
                            <p class="text-xs text-slate-400 mb-2">REPORTED</p>
                            <p class="text-sm text-slate-100">${new Date(issue.dateReported).toLocaleDateString('en-IN')}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-xs text-slate-400 mb-2">DAYS OPEN</p>
                            <p class="text-sm font-bold text-amber-400">${daysOpen}d</p>
                        </div>
                        ${slaOn ? `
                        <div class="text-center">
                            <p class="text-xs text-slate-400 mb-2">SLA STATUS</p>
                            <p class="text-sm font-bold ${breached ? 'text-red-400' : 'text-emerald-400'}">${breached ? '⚠️ Breached' : '✓ On Track'}</p>
                        </div>` : ''}
                    </div>

                    <!-- Description -->
                    <div class="border-t border-slate-700 pt-4">
                        <p class="text-xs text-slate-400 mb-2">DESCRIPTION</p>
                        <p class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap">${issue.issue.description || 'No description provided'}</p>
                    </div>

                    <!-- Work Status -->
                    <div class="border-t border-slate-700 pt-4">
                        <p class="text-xs text-slate-400 mb-2">WORK STATUS</p>
                        <div class="space-y-2 text-sm">
                            <p><span class="text-slate-400">Current status:</span> <span style="background-color: ${statusColor}" class="text-white px-2 py-0.5 rounded font-bold text-xs uppercase ml-1">${issue.builder.status || 'ASSIGNED'}</span></p>
                            <p><span class="text-slate-400">Last updated:</span> <span class="text-slate-100">${statusTime}</span></p>
                            <p><span class="text-slate-400">Assigned vendor:</span> <span class="text-slate-100">${issue.builder.assignedVendor || 'Not assigned'}</span></p>
                            <p><span class="text-slate-400">Latest comment:</span> <span class="text-slate-100 whitespace-pre-wrap">${issue.builder.comment || 'No comments yet'}</span></p>
                        </div>
                    </div>

                    <!-- Photos -->
                    <div class="border-t border-slate-700 pt-4">
                        ${issue.issue.photoLinks && issue.issue.photoLinks.length > 0 ? `
                            <div class="flex justify-between items-center mb-3">
                                <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">
                                    <i class="fas fa-paperclip mr-1"></i>Attachments (${issue.issue.photoLinks.length})
                                </p>
                                ${(((window.IRP_CLIENT_CONFIG || {}).attachmentFolderUrl) || '') ? `
                                    <a href="${(window.IRP_CLIENT_CONFIG || {}).attachmentFolderUrl}"
                                       target="_blank" rel="noopener noreferrer"
                                       class="text-xs text-amber-400 hover:text-amber-300 inline-flex items-center gap-1">
                                        <i class="fab fa-google-drive"></i> Open Drive folder
                                    </a>` : ''}
                            </div>
                            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                ${issue.issue.photoLinks.map((link, idx) => {
                                    const fileId = extractDriveFileId(link);
                                    const thumb = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w800` : link;
                                    const viewer = fileId ? `https://drive.google.com/file/d/${fileId}/view` : link;
                                    return `
                                        <a href="${viewer}" target="_blank" rel="noopener noreferrer"
                                           onclick="event.preventDefault(); openPhotoLightbox('${fileId || ''}', '${viewer}')"
                                           class="group relative block rounded-lg overflow-hidden border border-slate-600/40 hover:border-amber-400/60 bg-slate-800/40 transition-all aspect-square cursor-zoom-in">
                                            <img src="${thumb}" alt="Photo ${idx + 1}" loading="lazy"
                                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                 onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\\'w-full h-full flex flex-col items-center justify-center text-slate-400 text-xs p-2 text-center\\'><i class=\\'fas fa-file-image text-2xl mb-2\\'></i>Preview unavailable<span class=\\'text-amber-400 mt-1\\'>Click to open</span></div>'">
                                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center p-2">
                                                <span class="text-white text-xs font-semibold"><i class="fas fa-search-plus mr-1"></i>Click to enlarge</span>
                                            </div>
                                        </a>`;
                                }).join('')}
                            </div>
                        ` : `
                            <p class="text-xs text-slate-400 mb-3">PHOTOS</p>
                            <p class="text-xs text-slate-500 italic">No photos attached</p>
                        `}
                    </div>
                </div>
            `;

            document.getElementById('detailsContent').innerHTML = detailedContent;
            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function extractDriveFileId(url) {
            if (!url) return null;
            const m = String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/) ||
                      String(url).match(/\/file\/d\/([a-zA-Z0-9_-]+)/) ||
                      String(url).match(/\/d\/([a-zA-Z0-9_-]+)/);
            return m ? m[1] : null;
        }

        // Inline photo lightbox: opens a click-to-enlarge overlay so users
        // can preview attachments without leaving the page. Falls back to
        // the raw link when the URL isn't a Drive file id we can resolve.
        function openPhotoLightbox(fileId, viewer) {
            const lb = document.getElementById('photoLightbox');
            const img = document.getElementById('photoLightboxImg');
            const open = document.getElementById('photoLightboxOpen');
            if (!lb || !img) return;
            const src = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w2000` : viewer;
            img.src = src;
            img.onerror = function () { this.onerror = null; this.src = viewer; };
            if (open) open.href = viewer || '#';
            lb.classList.remove('hidden');
            lb.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }
        function closePhotoLightbox(e) {
            if (e && e.target !== e.currentTarget) return;
            const lb = document.getElementById('photoLightbox');
            const img = document.getElementById('photoLightboxImg');
            if (!lb) return;
            lb.classList.add('hidden');
            lb.classList.remove('flex');
            if (img) img.src = '';
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', function (e) {
            if (e.key !== 'Escape') return;
            const lb = document.getElementById('photoLightbox');
            if (lb && !lb.classList.contains('hidden')) closePhotoLightbox();
        });

        function filterByStatus(status) {
            builderStatusFilter = String(status || '').toUpperCase();
            renderIssuesTable();
        }

        function filterByDate(value) {
            builderDateFilter = value || 'ALL';
            renderIssuesTable();
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            const palette = {
                error: 'bg-red-500',
                warning: 'bg-amber-500',
                success: 'bg-green-500'
            };
            const bg = palette[type] || palette.success;
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded shadow-lg text-white font-bold z-50 ${bg}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function openExportReport() {
            const features = ((window.IRP_CLIENT_CONFIG || {}).features) || {};
            if (features.FEATURE_PDF_REPORT !== true) {
                showToast('✗ Export Report is disabled', 'error');
                return;
            }
            const active = allIssues.filter(i => String((i.builder && i.builder.status) || '').toUpperCase() !== 'WORK_COMPLETED');
            const closed = allIssues.filter(i => String((i.builder && i.builder.status) || '').toUpperCase() === 'WORK_COMPLETED');
            const filterNote = builderStatusFilter ? 'Status=' + builderStatusFilter : 'none';
            const slaOn = __slaOn();
            const slaCols = slaOn ? ['slaDue', 'breached'] : [];
            window.IRP_REPORT.open({
                pageContext: 'builder',
                title: 'Builder Tasks Report',
                filtersAppliedSummary: filterNote,
                sources: [
                    { key: 'active', label: 'Active Tasks', color: [234, 179, 8],  data: active },
                    { key: 'closed', label: 'Completed',    color: [16, 185, 129], data: closed }
                ],
                // Full privileges — the wizard exposes the full column
                // catalog on every view. Pre-check the columns most
                // useful for a builder run so the first render stays
                // uncluttered; the operator can enable anything else
                // (subcategory, action-by, rejection, etc.) via the
                // wizard's Advanced Options.
                columnDefaultsOn: [
                    'ticketId', 'tower', 'category', 'severity', 'status',
                    'description', ...slaCols, 'vendor', 'remarks', 'photos'
                ]
            });
        }

        // Surface any redirect notices (e.g. from a committee-only page) as a
        // non-blocking toast, then strip the param so reloads stay clean.
        (function showRedirectNotice() {
            const params = new URLSearchParams(location.search);
            const notice = params.get('notice');
            if (!notice) return;
            const messages = {
                committee_only: 'That page is restricted to Technical Committee members.'
            };
            const msg = messages[notice];
            if (msg) showToast(msg, 'warning');
            params.delete('notice');
            const qs = params.toString();
            history.replaceState({}, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
        })();

        function logout() {
            API.signOut();
        }

        // Initial load — populate the Sort dropdown from the shared
        // catalog (needs pdf-report.html included above; safe to call
        // even if the partial hasn't finished parsing — falls back to
        // the minimal two-option severity toggle), then fetch data.
        _populateSortSelect('issuesSort', issuesSort);
        loadData();
        // Auto-refresh every 30 seconds (silent so we don't fire a
        // toast on every tick). Cleared / restored by toggleAutoRefresh.
        autoRefreshInterval = setInterval(() => loadData({ silent: true }), 30000);
    </script>
</body>
</html>
