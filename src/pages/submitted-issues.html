    <script>
        // Back-to-login button. Apps Script renders this page inside a
        // sandboxed iframe where plain location.href is silently dropped,
        // so we use window.open(url, '_top') which HtmlService whitelists.
        function goLogin() {
            const url = (window.IRP_WEBAPP_URL || '').split('?')[0] || (location.origin + location.pathname);
            try { window.open(url, '_top'); }
            catch (e) { location.href = url; }
        }

        function openExportReport() {
            const features = ((window.IRP_CLIENT_CONFIG || {}).features) || {};
            if (features.FEATURE_PDF_REPORT !== true) {
                alert('Export Report is disabled.');
                return;
            }
            // Use the currently visible (filtered + searched) list rather
            // than the full set, so the PDF reflects what the user sees.
            const visible = (typeof getVisibleIssues === 'function') ? getVisibleIssues() : allIssues;
            // Split the unified submitted feed into the same buckets the
            // committee/builder views show, so the resident-facing report
            // covers all stages on a single export.
            const stageOf = (i) => String(i.state || i.status || (i.builder && i.builder.status) || '').toUpperCase();
            const isPending  = (s) => s === 'PENDING' || s === 'PENDING_APPROVAL' || s === '' || s === 'NEW';
            const isRejected = (s) => s === 'REJECTED';
            const isClosed   = (s) => s === 'CLOSED' || s === 'RESOLVED' || s === 'WORK_COMPLETED';
            const pending  = visible.filter(i => { const s = stageOf(i); return isPending(s); });
            const rejected = visible.filter(i => isRejected(stageOf(i)));
            const closed   = visible.filter(i => isClosed(stageOf(i)));
            const active   = visible.filter(i => {
                const s = stageOf(i); return !isPending(s) && !isRejected(s) && !isClosed(s);
            });
            window.IRP_REPORT.open({
                pageContext: 'submitted',
                title: 'Community Issues Report',
                filtersAppliedSummary: 'Current page filters',
                sources: [
                    { key: 'pending',  label: 'Pending Approval', color: [59, 130, 246],  data: pending },
                    { key: 'rejected', label: 'Rejected',         color: [148, 163, 184], data: rejected },
                    { key: 'active',   label: 'Active',           color: [234, 179,   8], data: active },
                    { key: 'closed',   label: 'Closed',           color: [34, 197,   94], data: closed }
                ],
                // Viewer mode: minimal, form-entry-driven columns only.
                // Ticket id + title (description) + form fields (tower /
                // unit, resident, category, severity, submitted) + status
                // + inline photos.
                columnKeys:       ['ticketId', 'description', 'tower', 'resident', 'category', 'severity', 'dateReported', 'status', 'photos'],
                columnDefaultsOn: ['ticketId', 'description', 'tower', 'category', 'status', 'photos']
            });
        }

        // === Auth (read-only view; anonymous allowed) ===
        (async function captureUser() {
            try {
                const u = await API.whoAmI();
                window.IRP_USER = u;
            } catch (e) {
                console.warn('whoAmI failed (continuing as anonymous):', e);
                window.IRP_USER = { email: '', role: 'UNKNOWN' };
            }
        })();

        // Store all issues for filtering
        let allIssues = [];
        // Feature flags fetched from the server; default to hiding severity
        // on this read-only view (controlled by
        // FEATURE_SHOW_SEVERITY_ON_SUBMITTED in CONFIG).
        let SHOW_SEVERITY = false;

        async function applyFeatureFlags() {
            try {
                const cfg = await API.call('getClientConfig');
                const features = (cfg && cfg.data && cfg.data.features) || (cfg && cfg.features) || {};
                SHOW_SEVERITY = !!features.FEATURE_SHOW_SEVERITY_ON_SUBMITTED;
                // Stash the full client-config for IRP_REPORT to consult.
                window.IRP_CLIENT_CONFIG = (cfg && cfg.data) || cfg || { features: features, tunables: {} };
                if (features.FEATURE_PDF_REPORT === true) {
                    const btn = document.getElementById('exportReportBtn');
                    if (btn) btn.classList.remove('hidden');
                }
                // Auto-commit the rendered PDF as TA_IAP_Full_Report.pdf
                // (same canonical file the committee + builder Export
                // commits to) when FEATURE_PUBLIC_FULL_REPORT is on. The
                // server-side feed (getSubmittedIssues) now includes
                // CLOSED tickets under the same flag, so this PDF is
                // complete enough to overwrite the canonical file.
                // commitFullReportPdf itself also requires
                // FEATURE_WEEKLY_REPORT_BACKUP + has a size cap.
                if (features.FEATURE_PUBLIC_FULL_REPORT === true &&
                    features.FEATURE_WEEKLY_REPORT_BACKUP === true) {
                    window.IRP_AUTO_COMMIT_FULL_REPORT = true;
                }
                // View Full Report pill — shown whenever a public URL
                // resolves (auto-derived server-side when empty). No
                // feature-flag gate: this is a passive read-only link.
                try {
                    const tunables = (cfg && cfg.data && cfg.data.tunables) || (cfg && cfg.tunables) || {};
                    const url = tunables.FULL_REPORT_PUBLIC_URL || '';
                    if (url) {
                        const a = document.getElementById('fullReportBtn');
                        if (a) { a.href = url; a.classList.remove('hidden'); }
                    }
                } catch (e) { /* non-fatal */ }
            } catch (e) {
                SHOW_SEVERITY = false;
                window.IRP_CLIENT_CONFIG = { features: {}, tunables: {} };
            }
            const sevFilter = document.getElementById('severityFilter');
            if (sevFilter) sevFilter.classList.toggle('hidden', !SHOW_SEVERITY);
            document.querySelectorAll('.sev-sort-option').forEach(opt => {
                opt.hidden = !SHOW_SEVERITY;
                opt.disabled = !SHOW_SEVERITY;
            });
        }

        // Load all issues on page load
        window.addEventListener('load', async () => {
            await applyFeatureFlags();
            loadAllIssues();
        });

        // ========================
        // DATA NORMALIZATION
        // ========================
        
        // Normalize data to nested structure - handles both API and mock data
        function normalizeIssueData(data) {
            if (!data) return null;
            // If already normalized, return as-is
            if (data.resident && typeof data.resident === 'object' && data.location && typeof data.location === 'object') {
                return data;
            }
            // Normalize flat structure to nested
            return {
                ticketId: data.ticketId || data.ticketID || '',
                issueTitle: data.issueTitle || data.issue?.description || data.description || '',
                resident: {
                    name: data.resident?.name || data.residentName || '',
                    email: data.resident?.email || data.residentEmail || '',
                    phone: data.resident?.phone || data.residentPhone || ''
                },
                location: {
                    tower: data.location?.tower || data.tower || '',
                    flat: data.location?.flat || data.flatNumber || data.flat || ''
                },
                issue: {
                    category: data.issue?.category || data.category || '',
                    subcategory: data.issue?.subcategory || data.subCategory || '',
                    severity: data.issue?.severity || data.severity || '',
                    description: data.issue?.description || data.description || '',
                    // Mirror the photo array into issue.photoLinks so the
                    // PDF wizard's COLUMN_CATALOG.photos.read() finds them.
                    // The legacy detail-modal renderer still reads the root
                    // `attachments` field, so we keep both populated.
                    photoLinks: data.issue?.photoLinks || data.attachments || []
                },
                status: data.status || 'PENDING_APPROVAL',
                dateReported: data.dateReported || '',
                attachments: data.attachments || []
            };
        }

        async function loadAllIssues() {
            try {
                // PENDING_REVIEW is the source-of-truth snapshot of every
                // intake; getSubmittedIssues enriches each row with the
                // current LIVE/CLOSED status by ticketId join.
                const data = await API.call('getSubmittedIssues');
                if (data && (data.responses || Array.isArray(data))) {
                    const responses = data.responses || data;
                    allIssues = (responses || []).map(normalizeIssueData);
                    displayIssues(sortIssues(allIssues, document.getElementById('sortSelect')?.value || 'date_desc'));
                } else {
                    console.warn('No data returned');
                    useMockData();
                }
            } catch (error) {
                console.error('Error loading issues:', error);
                console.log('Falling back to mock data...');
                useMockData();
            }
        }

        function displayIssues(issues) {
            const container = document.getElementById('issuesContainer');
            
            if (!issues || issues.length === 0) {
                showNoIssues();
                return;
            }

            container.innerHTML = issues.map((issue, index) => `
                <div class="premium-card rounded-xl overflow-hidden border border-slate-700 hover:border-amber-500/50 transition-all">
                    <!-- Collapsible Header -->
                    <div class="bg-gradient-to-r from-slate-800/30 to-slate-700/20 p-4 border-b gold-border cursor-pointer hover:bg-slate-800/40 transition-all" onclick="toggleIssue(${index})">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                                <h3 class="text-base sm:text-lg font-bold text-slate-100 break-words">${window.titleWithTicketId(issue)}</h3>
                                <p class="text-xs sm:text-sm text-slate-400 mt-2">
                                    <i class="fas fa-user mr-1.5"></i>${issue.resident.name || 'Unknown'}
                                    <span class="mx-1 text-slate-600">|</span>
                                    <i class="fas fa-building mr-1.5"></i>${issue.location.tower} / Flat ${issue.location.flat}
                                </p>
                                <!-- Badges flow under meta on narrow screens; stay inline on >=sm. -->
                                <div class="mt-2 flex flex-wrap items-center gap-2 sm:hidden">
                                    ${SHOW_SEVERITY ? `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[11px] font-bold ${getSeverityBadge(issue.issue.severity)}">
                                        ${issue.issue.severity || 'N/A'}
                                    </span>` : ''}
                                    <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[11px] font-bold ${getStatusBadge(issue.status)}">
                                        <i class="fas ${getStatusIcon(issue.status)}"></i>${issue.status || 'PENDING_APPROVAL'}
                                    </span>
                                </div>
                            </div>
                            <div class="hidden sm:flex items-center gap-2 flex-shrink-0">
                                ${SHOW_SEVERITY ? `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold ${getSeverityBadge(issue.issue.severity)}">
                                    ${issue.issue.severity || 'N/A'}
                                </span>` : ''}
                                <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold ${getStatusBadge(issue.status)}">
                                    <i class="fas ${getStatusIcon(issue.status)} mr-1"></i>${issue.status || 'PENDING_APPROVAL'}
                                </span>
                            </div>
                            <i class="fas fa-chevron-down text-amber-400 toggle-icon-${index} transition-transform flex-shrink-0 mt-1" style="transform: rotate(0deg)"></i>
                        </div>
                    </div>

                    <!-- Collapsible Content -->
                    <div class="issue-content-${index} max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                        <div class="p-5 space-y-4">
                            <!-- Ticket ID -->
                            ${issue.ticketId ? `
                            <div class="flex items-center justify-between bg-slate-800/30 rounded-lg px-3 py-2 border border-slate-700/50">
                                <span class="text-xs text-slate-400 uppercase tracking-wider gold-accent"><i class="fas fa-hashtag mr-2"></i>Ticket ID</span>
                                <span class="text-blue-300 font-mono text-sm">${issue.ticketId}</span>
                            </div>
                            ` : ''}

                            <!-- Where Issue Found -->
                            <div class="bg-slate-700/20 rounded-lg p-3 border border-slate-600/30">
                                <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent mb-2">
                                    <i class="fas fa-map-marker-alt mr-2"></i>Where Issue Found
                                </p>
                                <p class="text-slate-200 font-semibold text-lg">${issue.location.tower || 'N/A'}</p>
                            </div>

                            <!-- Reporter's Unit (Optional) -->
                            ${issue.location.flat && issue.location.flat !== 'N/A' ? `
                            <div class="bg-slate-700/10 rounded-lg p-3 border border-slate-600/20">
                                <p class="text-xs text-slate-400 uppercase tracking-wider mb-2">
                                    <i class="fas fa-home mr-2"></i>Reporter's Unit (Optional)
                                </p>
                                <p class="text-slate-300 font-medium">Flat ${issue.location.flat}</p>
                            </div>
                            ` : ''}

                            <!-- Issue Details -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">Category</p>
                                    <p class="text-slate-200 font-semibold">
                                        ${issue.issue.category || 'N/A'}${issue.issue.subcategory ? ` <span class="text-amber-400">→</span> <span class="text-slate-300 font-normal">${issue.issue.subcategory}</span>` : ''}
                                    </p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">Status</p>
                                    <p class="text-slate-200 font-semibold">${issue.status || 'Reported'}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">Date Reported</p>
                                    <p class="text-slate-200 font-semibold">${formatDate(issue.dateReported) || 'N/A'}</p>
                                </div>
                            </div>

                            <!-- Description -->
                            <div>
                                <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent mb-2">Description</p>
                                <p class="text-slate-300 leading-relaxed bg-slate-800/20 rounded-lg p-3 border border-slate-700/50">
                                    ${issue.issue.description || 'No description provided'}
                                </p>
                            </div>

                            <!-- Attachments -->
                            ${issue.attachments && issue.attachments.length > 0 ? `
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="text-xs text-slate-400 uppercase tracking-wider gold-accent">
                                            <i class="fas fa-paperclip mr-1"></i>Attachments (${issue.attachments.length})
                                        </p>
                                        ${(((window.IRP_CLIENT_CONFIG || {}).attachmentFolderUrl) || '') ? `
                                        <a href="${(window.IRP_CLIENT_CONFIG || {}).attachmentFolderUrl}"
                                           target="_blank" rel="noopener noreferrer"
                                           class="text-xs text-amber-400 hover:text-amber-300 inline-flex items-center gap-1">
                                            <i class="fab fa-google-drive"></i> Open Drive folder
                                        </a>` : ''}
                                    </div>
                                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                        ${issue.attachments.map(att => {
                                            const fileId = extractDriveFileId(att);
                                            const thumb = fileId ? `https:\u002f\u002fdrive.google.com\u002fthumbnail?id=${fileId}&sz=w800` : att;
                                            const viewer = fileId ? `https:\u002f\u002fdrive.google.com\u002ffile\u002fd\u002f${fileId}\u002fview` : att;
                                            return `
                                            <a href="${viewer}" target="_blank" rel="noopener noreferrer"
                                               class="group relative block rounded-lg overflow-hidden border border-slate-600/40 hover:border-amber-400/60 bg-slate-800/40 transition-all aspect-square">
                                                <img src="${thumb}" alt="Attachment" loading="lazy"
                                                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                     onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'w-full h-full flex flex-col items-center justify-center text-slate-400 text-xs p-2 text-center\'><i class=\'fas fa-file-image text-2xl mb-2\'></i>Preview unavailable<span class=\'text-amber-400 mt-1\'>Click to open</span></div>'">
                                                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center p-2">
                                                    <span class="text-white text-xs font-semibold"><i class="fas fa-external-link-alt mr-1"></i>View Full Size</span>
                                                </div>
                                            </a>`;
                                        }).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterIssues() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortKey = document.getElementById('sortSelect') ? document.getElementById('sortSelect').value : 'date_desc';
            const catFilter = document.getElementById('categoryFilter') ? document.getElementById('categoryFilter').value : '';
            const towerFilter = document.getElementById('towerFilter') ? document.getElementById('towerFilter').value : '';
            const sevFilter = document.getElementById('severityFilter') ? document.getElementById('severityFilter').value : '';
            const statusFilter = document.getElementById('statusFilter') ? document.getElementById('statusFilter').value : '';

            const filtered = allIssues.filter(issue => {
                const searchStr = `${issue.ticketId} ${issue.resident.name} ${issue.issue.category} ${issue.issue.subcategory} ${issue.issueTitle} ${issue.location.tower} ${issue.location.flat}`.toLowerCase();
                if (!searchStr.includes(searchTerm)) return false;
                if (catFilter && String(issue.issue.category).trim().toLowerCase() !== catFilter.toLowerCase()) return false;
                if (towerFilter && String(issue.location.tower).trim().toLowerCase() !== towerFilter.toLowerCase()) return false;
                if (sevFilter && String(issue.issue.severity).trim().toUpperCase() !== sevFilter.toUpperCase()) return false;
                if (statusFilter && String(issue.status).trim().toUpperCase() !== statusFilter.toUpperCase()) return false;
                return true;
            });

            displayIssues(sortIssues(filtered, sortKey));
        }

        function sortIssues(issues, key) {
            // Canonical orderings (matching the Google Form dropdowns)
            const severityOrder = ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'];
            const categoryOrder = ['Civil', 'Plumbing', 'Electrical', 'Fire Safety', 'Lift', 'Security', 'Amenities', 'Common Area', 'Documentation'];
            const towerOrder    = ['Tower A', 'Tower B', 'Tower C', 'Common Area'];

            const rankIn = (list, value, caseInsensitive = false) => {
                if (!value) return 999;
                const v = caseInsensitive ? String(value).toUpperCase() : String(value).trim();
                const idx = caseInsensitive
                    ? list.indexOf(v)
                    : list.findIndex(x => x.toLowerCase() === v.toLowerCase());
                return idx === -1 ? 999 : idx;  // unknown values sort to the end
            };
            const sevRank   = i => rankIn(severityOrder, i.issue.severity, true);
            const catRank   = i => rankIn(categoryOrder, i.issue.category);
            const towerRank = i => rankIn(towerOrder, i.location.tower);
            const dateOf    = i => { const d = new Date(i.dateReported); return isNaN(d) ? 0 : d.getTime(); };

            const arr = [...issues];
            switch (key) {
                case 'date_asc':   arr.sort((a,b) => dateOf(a) - dateOf(b)); break;
                case 'sev_desc':   arr.sort((a,b) => sevRank(a)   - sevRank(b)   || dateOf(b) - dateOf(a)); break;
                case 'sev_asc':    arr.sort((a,b) => sevRank(b)   - sevRank(a)   || dateOf(b) - dateOf(a)); break;
                case 'cat_asc':    arr.sort((a,b) => catRank(a)   - catRank(b)   || dateOf(b) - dateOf(a)); break;
                case 'cat_desc':   arr.sort((a,b) => catRank(b)   - catRank(a)   || dateOf(b) - dateOf(a)); break;
                case 'tower_asc':  arr.sort((a,b) => towerRank(a) - towerRank(b) || dateOf(b) - dateOf(a)); break;
                case 'tower_desc': arr.sort((a,b) => towerRank(b) - towerRank(a) || dateOf(b) - dateOf(a)); break;
                case 'date_desc':
                default:           arr.sort((a,b) => dateOf(b) - dateOf(a));
            }
            return arr;
        }

        function toggleIssue(index) {
            const content = document.querySelector(`.issue-content-${index}`);
            const icon = document.querySelector(`.toggle-icon-${index}`);
            
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                // Collapse
                content.style.maxHeight = '0px';
                icon.style.transform = 'rotate(0deg)';
            } else {
                // Expand
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function showNoIssues() {
            document.getElementById('issuesContainer').innerHTML = `
                <div class="premium-card rounded-xl p-12 text-center border border-slate-700">
                    <i class="fas fa-inbox text-slate-500 text-4xl mb-4"></i>
                    <p class="text-slate-400 text-lg">No issues found</p>
                    <p class="text-slate-500 text-sm mt-2">Check back later for new submitted issues</p>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('issuesContainer').innerHTML = `
                <div class="premium-card rounded-xl p-8 text-center border border-red-500/30 bg-red-500/10">
                    <i class="fas fa-exclamation-circle text-red-400 text-3xl mb-4"></i>
                    <p class="text-red-300">${message}</p>
                </div>
            `;
        }

        function getSeverityBadge(severity) {
            const badges = {
                'CRITICAL': 'bg-red-600/30 text-red-200 border border-red-500/50',
                'HIGH': 'bg-orange-600/30 text-orange-200 border border-orange-500/50',
                'MEDIUM': 'bg-yellow-600/30 text-yellow-200 border border-yellow-500/50',
                'LOW': 'bg-green-600/30 text-green-200 border border-green-500/50'
            };
            return badges[severity] || 'bg-slate-600/30 text-slate-200 border border-slate-500/50';
        }

        function getStatusBadge(status) {
            const badges = {
                'PENDING_APPROVAL': 'bg-amber-600/30 text-amber-200 border border-amber-500/50',
                'ASSIGNED': 'bg-purple-600/30 text-purple-200 border border-purple-500/50',
                'IN_PROGRESS': 'bg-cyan-600/30 text-cyan-200 border border-cyan-500/50',
                'WORK_COMPLETED': 'bg-emerald-600/30 text-emerald-200 border border-emerald-500/50',
                'REOPENED': 'bg-orange-600/30 text-orange-200 border border-orange-500/50',
                'CLOSED': 'bg-slate-600/30 text-slate-200 border border-slate-500/50',
                'REJECTED': 'bg-red-600/30 text-red-200 border border-red-500/50'
            };
            return badges[status] || 'bg-slate-600/30 text-slate-200 border border-slate-500/50';
        }

        function getStatusIcon(status) {
            const icons = {
                'PENDING_APPROVAL': 'fa-hourglass-half',
                'ASSIGNED': 'fa-user-check',
                'IN_PROGRESS': 'fa-spinner fa-pulse',
                'WORK_COMPLETED': 'fa-check-circle',
                'REOPENED': 'fa-rotate-left',
                'CLOSED': 'fa-lock',
                'REJECTED': 'fa-ban'
            };
            return icons[status] || 'fa-circle';
        }

        function parseAttachments(value) {
            if (!value) return [];
            // Google Forms file uploads are comma-separated URLs
            return String(value).split(',').map(s => s.trim()).filter(Boolean);
        }

        function extractDriveFileId(url) {
            if (!url) return null;
            // Match formats: ?id=FILE_ID  or  /file/d/FILE_ID/  or  /d/FILE_ID
            const m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/) ||
                      url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) ||
                      url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            return m ? m[1] : null;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                return new Date(dateStr).toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }
    </script>
</body>
