        <!-- Logo Section -->
        <div class="text-center mb-8">
            <!-- Logo Only (Compact) -->
            <div class="mb-6">
                <img src="<?!= include('src/partials/logo-src') ?>" alt="The Address" class="h-16 mx-auto drop-shadow-lg">
            </div>
            <!-- Alternative: Logo with Text (Uncomment to use) -->
            <!-- <div class="mb-6"><img src="../../assets/images/TaLogoName.png" alt="The Address" class="h-20 mx-auto drop-shadow-lg"></div> -->
            <h2 class="text-xl font-bold text-slate-100 mb-2">Issue Addressal Portal</h2>

        <a href="https://forms.gle/zFWTnLUdNEGGj7hk9" target="_blank" rel="noopener noreferrer"

        <!-- OR Divider -->
        <div class="flex items-center gap-4 my-6">

            <div class="flex-1 h-px bg-gradient-to-l from-slate-700 to-transparent"></div>

        <!-- Sign-in / access status -->
        <div id="authBox" class="space-y-4">
            <div id="authStatus" class="text-center text-slate-300 text-sm">

            <!-- Google Identity Services renders its branded button here when a client id is configured. -->
            <div id="gisButton" class="flex justify-center"></div>

                <i class="fas fa-sign-in-alt mr-2"></i><span id="primaryLabel">Open Dashboard</span>

                <i class="fab fa-google mr-2 text-amber-500"></i>Sign in with Google
            </button>

        </p>

    <?!= include('src/partials/api') ?>
    <script>
        // Build a same-app URL. On Apps Script /exec uses ?page=key; in local
        // dev (preview) we fall back to flat .html filenames in the same folder.
        function pageUrl(key) {
            const base = window.IRP_WEBAPP_URL || '';
            // Tech-mode pages live on a separate deployment that requires Google
            // sign-in. The URL is provided by CONFIG row TECH_WEBAPP_URL.
            const techKeys = { committee: 1, builder: 1, admin: 1, submit: 1 };
            const techBase = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL) || '';
            if (techKeys[key] && techBase) return techBase + '?page=' + encodeURIComponent(key);
            if (base) return base + '?page=' + encodeURIComponent(key);
            const local = { submitted: 'submitted-issues.html', submit: 'submit-issue.html',
                            committee: 'committee-dashboard.html', builder: 'builder-dashboard.html',
                            admin: 'admin-dashboard.html' };
            return local[key] || 'index.html';
        }
        function goSubmitted() { location.href = pageUrl('submitted'); }
        function goSubmit()    { location.href = pageUrl('submit'); }
        function switchAccount() {
            try { localStorage.removeItem('IRP_LAST_USER'); } catch(e) {}
            try { if (window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect(); } catch(e) {}
            API.signOut();
        }
        function signIn() {
            // If GIS is available, prompt the One Tap / account chooser.
            if (window.google && google.accounts && google.accounts.id && window.IRP_GIS_READY) {
                try { google.accounts.id.prompt(); return; } catch (e) { /* fall through */ }
            }
            // Else: redirect to the tech-mode deployment if configured.
            const techBase = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL) || '';
            if (techBase) { location.href = techBase; return; }
            // Last resort: Google account chooser.
            const here = new URL(location.href);
            const chooser = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(here.toString());
            location.href = chooser;
        }
        function goDashboard() {
            const u = window.IRP_USER || {};
            if (u.role === 'COMMITTEE') location.href = pageUrl('committee');
            else if (u.role === 'BUILDER') location.href = pageUrl('builder');
            else location.reload();
        }

        // Renders the verified-user UI and auto-redirects to the right dashboard.
        function applyAuthenticatedUser(u) {
            const statusEl = document.getElementById('authStatus');
            const btn = document.getElementById('primaryAction');
            const label = document.getElementById('primaryLabel');
            const switchBtn = document.getElementById('switchAcct');
            const signInBtn = document.getElementById('signInBtn');
            const submitBtn = document.getElementById('submitBtn');
            const gisHost = document.getElementById('gisButton');
            window.IRP_USER = u;
            try { localStorage.setItem('IRP_LAST_USER', JSON.stringify({ email: u.email, role: u.role, ts: Date.now() })); } catch(e) {}
            if (gisHost) gisHost.classList.add('hidden');
            if (signInBtn) signInBtn.classList.add('hidden');
            if (switchBtn) switchBtn.classList.remove('hidden');
            if (u.role === 'COMMITTEE') {
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Technical Committee)';
                label.textContent = 'Open Committee Dashboard';
                btn.classList.remove('hidden');
            } else if (u.role === 'BUILDER') {
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Builder)';
                label.textContent = 'Open Builder Dashboard';
                btn.classList.remove('hidden');
            } else if (u.role === 'RESIDENT') {
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Resident)';
                const cc = window.IRP_CLIENT_CONFIG || {};
                const canSubmit = !((cc.features && cc.features.FEATURE_IN_PORTAL_SUBMIT) === false);
                if (canSubmit && submitBtn) submitBtn.classList.remove('hidden');
            }
        }

        async function handleGoogleCredential(credResponse) {
            const statusEl = document.getElementById('authStatus');
            if (!credResponse || !credResponse.credential) return;
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-2 text-amber-400"></i>Verifying with server\u2026';
            try {
                const res = await API.loginWithIdToken(credResponse.credential);
                if (res && res.sessionToken) {
                    API.setSession(res.sessionToken, { email: res.email, role: res.role });
                    applyAuthenticatedUser({ email: res.email, role: res.role });
                    return;
                }
                statusEl.innerHTML = '<i class="fas fa-times-circle text-red-400 mr-2"></i>Sign-in failed: server returned no session token.';
            } catch (err) {
                const msg = (err && err.message) || String(err);
                statusEl.innerHTML = '<i class="fas fa-times-circle text-red-400 mr-2"></i>' +
                    msg.replace(/</g, '&lt;');
            }
        }
        window.handleGoogleCredential = handleGoogleCredential;

        function initGoogleIdentity(clientId) {
            if (!clientId) return false;
            if (!(window.google && google.accounts && google.accounts.id)) return false;
            try {
                google.accounts.id.initialize({
                    client_id: clientId,
                    callback: handleGoogleCredential,
                    auto_select: true,
                    cancel_on_tap_outside: false,
                    use_fedcm_for_prompt: true
                });
                const host = document.getElementById('gisButton');
                if (host) {
                    host.innerHTML = '';
                    google.accounts.id.renderButton(host, {
                        type: 'standard', theme: 'filled_blue', size: 'large',
                        text: 'signin_with', shape: 'pill', logo_alignment: 'left'
                    });
                }
                google.accounts.id.prompt(); // One Tap auto-prompt
                window.IRP_GIS_READY = true;
                return true;
            } catch (e) {
                console.error('GIS init failed:', e);
                return false;
            }
        }

        (async function init() {
            const statusEl = document.getElementById('authStatus');
            const switchBtn = document.getElementById('switchAcct');
            const signInBtn = document.getElementById('signInBtn');
            // Always fetch client config so signIn() has TECH_WEBAPP_URL and
            // GOOGLE_OAUTH_CLIENT_ID even for unauthenticated visitors.
            try {
                const cc = await API.getClientConfig();
                window.IRP_CLIENT_CONFIG = cc || {};
            } catch (e) { /* non-fatal */ }
            const tun = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables) || {};
            const clientId = tun.GOOGLE_OAUTH_CLIENT_ID || '';

            // 1) If we already hold a valid session token in localStorage, use it.
            const tok = API.loadSession();
            if (tok && API._user && API._user.email) {
                applyAuthenticatedUser(API._user);
                // Refresh role in background by asking the server with the token.
                try { const r = await API.call('validateUserAccess'); if (r && r.email) applyAuthenticatedUser(r); } catch (e) {}
                return;
            }

            // 2) USER_ACCESSING deployment path: Session.getActiveUser() will return the email.
            try {
                const u = await new Promise((resolve, reject) => {
                    if (!(typeof google !== 'undefined' && google.script && google.script.run)) return resolve({ email: '', role: 'UNKNOWN' });
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).api_whoAmI();
                });
                if (u && u.email && u.role !== 'UNKNOWN') { applyAuthenticatedUser(u); return; }
                if (u && u.email && u.role === 'UNKNOWN') {
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-amber-400 mr-2"></i>' +
                        '<b>' + u.email + '</b> is not authorized. Contact the committee to be added to the CONFIG list, then reload.';
                    switchBtn.classList.remove('hidden');
                    return;
                }
            } catch (e) { /* fall through to GIS path */ }

            // 3) Anonymous deployment: use Google Identity Services to grab the
            // already-signed-in Gmail account (One Tap) and verify on the server.
            if (clientId && initGoogleIdentity(clientId)) {
                statusEl.innerHTML = '<i class="fab fa-google mr-2 text-amber-400"></i>Sign in with your Google account to continue. (One Tap will appear if you\u2019re already signed in.)';
                return;
            }

            // 4) Fallback messaging when GIS isn\u2019t configured.
            statusEl.innerHTML = '<i class="fab fa-google mr-2 text-amber-400"></i>' +
                'Sign-in is not configured yet. Admin: set <code class="text-amber-300">GOOGLE_OAUTH_CLIENT_ID</code> in the CONFIG sheet to enable one-click Google sign-in here.';
            signInBtn.classList.remove('hidden');
        })();
    </script>
</body>
</html>
