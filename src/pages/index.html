    <script>
        // Set by the server when this template is rendered as a denial page —
        // the originally-requested page key (e.g. "committee") so we can
        // auto-redirect anonymous visitors to the secure deployment URL.
        window.IRP_REQUESTED_PAGE = "<?= (typeof requestedPage !== 'undefined' ? requestedPage : '') ?>";
    </script>
    <script>
        // Build a same-app URL. On Apps Script /exec uses ?page=key; in local
        // dev (preview) we fall back to flat .html filenames in the same folder.
        function pageUrl(key) {
            const base = window.IRP_WEBAPP_URL || '';
            // Tech-mode pages live on a separate deployment that requires Google
            // sign-in. The URL is provided by CONFIG row TECH_WEBAPP_URL.
            const techKeys = { committee: 1, builder: 1, admin: 1, submit: 1 };
            const techBase = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL) || '';
            if (techKeys[key] && techBase) return techBase + '?page=' + encodeURIComponent(key);
            if (base) return base + '?page=' + encodeURIComponent(key);
            const local = { submitted: 'submitted-issues.html', submit: 'submit-issue.html',
                            committee: 'committee-dashboard.html', builder: 'builder-dashboard.html',
                            admin: 'admin-dashboard.html' };
            return local[key] || 'index.html';
        }
        function goSubmitted() { openTop(pageUrl('submitted')); }
        function goSubmit()    { openTop(pageUrl('submit')); }
        function switchAccount() {
            try { localStorage.removeItem('IRP_LAST_USER'); } catch(e) {}
            API.signOut();
        }

        // Returns the secure (sign-in required) deployment URL, with the
        // requested page tacked on so the user lands where they intended.
        function secureUrl(pageKey) {
            const techBase = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL) || '';
            if (!techBase) return '';
            if (!pageKey) return techBase;
            const sep = techBase.indexOf('?') === -1 ? '?' : '&';
            return techBase + sep + 'page=' + encodeURIComponent(pageKey);
        }

        function signIn() {
            const want = (window.IRP_REQUESTED_PAGE || new URLSearchParams(location.search).get('page') || '').replace(/[^a-z]/gi, '');
            const url = secureUrl(want);
            if (url) { openTop(url); return; }
            // No secure deployment configured — last-resort account chooser so
            // the user can at least sign in to Google before retrying.
            const here = new URL(location.href);
            openTop('https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(here.toString()));
        }

        // Apps Script renders inside a sandboxed iframe, so plain
        // location.href to a different origin is silently dropped. Use
        // window.open(url, '_top') which HtmlService whitelists.
        function openTop(url) {
            try { window.open(url, '_top'); } catch (e) { location.href = url; }
        }

        function goDashboard() {
            const u = window.IRP_USER || {};
            // Use openTop (window.open(url,'_top')) so the dashboard URL
            // (with ?page=...) lives on the OUTER browser address bar, not
            // just inside the Apps Script iframe. Without this, a refresh
            // re-runs doGet with no page param and lands back on /login.
            if (u.role === 'COMMITTEE') openTop(pageUrl('committee'));
            else if (u.role === 'BUILDER') openTop(pageUrl('builder'));
            else location.reload();
        }

        function applyAuthenticatedUser(u) {
            const statusEl  = document.getElementById('authStatus');
            const btn       = document.getElementById('primaryAction');
            const label     = document.getElementById('primaryLabel');
            const switchBtn = document.getElementById('switchAcct');
            const signInBtn = document.getElementById('signInBtn');
            const submitBtn = document.getElementById('submitBtn');
            window.IRP_USER = u;
            try { localStorage.setItem('IRP_LAST_USER', JSON.stringify({ email: u.email, role: u.role, ts: Date.now() })); } catch(e) {}
            if (signInBtn) signInBtn.classList.add('hidden');
            if (switchBtn) switchBtn.classList.remove('hidden');
            if (u.role === 'COMMITTEE') {
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Technical Committee)';
                label.textContent = 'Open Committee Dashboard';
                btn.classList.remove('hidden');
            } else if (u.role === 'BUILDER') {
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Builder)';
                label.textContent = 'Open Builder Dashboard';
                btn.classList.remove('hidden');
            } else if (u.role === 'RESIDENT') {
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Resident)';
                const cc = window.IRP_CLIENT_CONFIG || {};
                const canSubmit = !((cc.features && cc.features.FEATURE_IN_PORTAL_SUBMIT) === false);
                if (canSubmit && submitBtn) submitBtn.classList.remove('hidden');
            }
        }

        (async function init() {
            const statusEl  = document.getElementById('authStatus');
            const signInBtn = document.getElementById('signInBtn');
            const switchBtn = document.getElementById('switchAcct');
            try {
                const cc = await API.getClientConfig();
                window.IRP_CLIENT_CONFIG = cc || {};
            } catch (e) { /* non-fatal */ }

            let u = { email: '', role: 'UNKNOWN' };
            try {
                u = await new Promise((resolve, reject) => {
                    if (!(typeof google !== 'undefined' && google.script && google.script.run)) return resolve({ email: '', role: 'UNKNOWN' });
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).api_whoAmI();
                });
            } catch (e) { /* leave u as UNKNOWN */ }

            // Signed in and authorised — show role-based dashboard CTA.
            if (u && u.email && u.role !== 'UNKNOWN') {
                applyAuthenticatedUser(u);
                return;
            }

            // Signed in but email isn't in CONFIG.
            if (u && u.email && u.role === 'UNKNOWN') {
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-amber-400 mr-2"></i>' +
                    '<b>' + u.email + '</b> is not authorised. Ask the committee to add you to the CONFIG list, then reload.';
                switchBtn.classList.remove('hidden');
                return;
            }

            // Not signed in. This is the public (anonymous) deployment.
            // If the visitor was trying to open a protected page, auto-redirect
            // them to the secure deployment URL so Google can sign them in.
            const want = (window.IRP_REQUESTED_PAGE || '').replace(/[^a-z]/gi, '');
            const secure = secureUrl(want);
            if (want && secure) {
                statusEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-2 text-amber-400"></i>Redirecting to secure sign-in…';
                openTop(secure);
                return;
            }

            // Anonymous landing on the public deployment.
            statusEl.innerHTML = '<i class="fab fa-google mr-2 text-amber-400"></i>' +
                'You’re viewing the public read-only portal. Sign in for committee or builder access.';
            signInBtn.classList.remove('hidden');
        })();
    </script>
