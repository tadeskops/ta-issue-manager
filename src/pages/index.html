<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 min-h-screen flex items-center justify-center px-4">

            <!-- Alternative: Logo with Text (Uncomment to use) -->

        <!-- OR Divider -->
        <div class="flex items-center gap-4 my-6">

                <i class="fas fa-sign-in-alt mr-2"></i><span id="primaryLabel">Open Dashboard</span>

    <?!= include('src/partials/api') ?>
    <script>
        // Build a same-app URL. On Apps Script /exec uses ?page=key; in local
        // dev (preview) we fall back to flat .html filenames in the same folder.
        function pageUrl(key) {
            const base = window.IRP_WEBAPP_URL || '';
            // Tech-mode pages live on a separate deployment that requires Google
            // sign-in. The URL is provided by CONFIG row TECH_WEBAPP_URL.
            const techKeys = { committee: 1, builder: 1, admin: 1, submit: 1 };
            const techBase = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL) || '';
            if (techKeys[key] && techBase) return techBase + '?page=' + encodeURIComponent(key);
            if (base) return base + '?page=' + encodeURIComponent(key);
            const local = { submitted: 'submitted-issues.html', submit: 'submit-issue.html',
                            committee: 'committee-dashboard.html', builder: 'builder-dashboard.html',
                            admin: 'admin-dashboard.html' };
            return local[key] || 'index.html';
        }
        function goSubmitted() { location.href = pageUrl('submitted'); }
        function goSubmit()    { location.href = pageUrl('submit'); }
        function switchAccount() {
            try { localStorage.removeItem('IRP_LAST_USER'); } catch(e) {}
            API.signOut();
        }
        function signIn() {
            // Preferred: redirect to the tech-mode deployment which is set to
            // "Execute as: user accessing", so Apps Script will trigger Google
            // sign-in and return identity to the page.
            const techBase = (window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL) || '';
            if (techBase) { location.href = techBase; return; }
            // Fallback: this deployment is ANONYMOUS, so Apps Script never
            // sees identity even if Google is signed-in. Send the user to
            // Google's account chooser so they can at least establish a
            // session; then return here. Mark the URL so init() can warn
            // the user that admin must still configure TECH_WEBAPP_URL.
            const here = new URL(location.href);
            here.searchParams.set('signedIn', '1');
            const chooser = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(here.toString());
            location.href = chooser;
        }
        function goDashboard() {
            const u = window.IRP_USER || {};
            if (u.role === 'COMMITTEE') location.href = pageUrl('committee');
            else if (u.role === 'BUILDER') location.href = pageUrl('builder');
            else location.reload();
        }

        (async function init() {
            const statusEl = document.getElementById('authStatus');
            const btn = document.getElementById('primaryAction');
            const label = document.getElementById('primaryLabel');
            const switchBtn = document.getElementById('switchAcct');
            const signInBtn = document.getElementById('signInBtn');
            const submitBtn = document.getElementById('submitBtn');
            // Always fetch client config so signIn() has TECH_WEBAPP_URL even
            // for unauthenticated visitors.
            try {
                const cc = await API.getClientConfig();
                window.IRP_CLIENT_CONFIG = cc || {};
            } catch (e) { /* non-fatal */ }
            // Best-effort cached identity: if a previous load on this device
            // ever resolved a real email, show it while we re-verify.
            let cached = null;
            try { cached = JSON.parse(localStorage.getItem('IRP_LAST_USER') || 'null'); } catch (e) {}
            const techConfigured = !!((window.IRP_CLIENT_CONFIG && window.IRP_CLIENT_CONFIG.tunables && window.IRP_CLIENT_CONFIG.tunables.TECH_WEBAPP_URL));
            try {
                const u = await API.whoAmI();
                window.IRP_USER = u;
                if (u && u.email) {
                    try { localStorage.setItem('IRP_LAST_USER', JSON.stringify({ email: u.email, role: u.role, ts: Date.now() })); } catch(e) {}
                }
                if (u.role === 'COMMITTEE') {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Technical Committee)';
                    label.textContent = 'Open Committee Dashboard';
                    btn.classList.remove('hidden');
                    switchBtn.classList.remove('hidden');
                } else if (u.role === 'BUILDER') {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Builder)';
                    label.textContent = 'Open Builder Dashboard';
                    btn.classList.remove('hidden');
                    switchBtn.classList.remove('hidden');
                } else if (u.role === 'RESIDENT') {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-400 mr-2"></i>Signed in as <b>' + u.email + '</b> (Resident)';
                    // Feature flag gate \u2014 hide submit CTA if disabled.
                    const cc = window.IRP_CLIENT_CONFIG || {};
                    const canSubmit = !((cc.features && cc.features.FEATURE_IN_PORTAL_SUBMIT) === false);
                    if (canSubmit && submitBtn) submitBtn.classList.remove('hidden');
                    switchBtn.classList.remove('hidden');
                } else if (u.email) {
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-amber-400 mr-2"></i>' +
                        '<b>' + u.email + '</b> is not authorized. Contact the committee to be added to the CONFIG list, then reload.';
                    switchBtn.classList.remove('hidden');
                } else if (cached && cached.email) {
                    // Anonymous deployment cannot read identity. Show the
                    // cached identity from a previous successful sign-in so
                    // the user knows they ARE signed in to Google.
                    const role = cached.role || 'UNKNOWN';
                    const roleLabel = role === 'COMMITTEE' ? 'Technical Committee' :
                                      role === 'BUILDER'   ? 'Builder' :
                                      role === 'RESIDENT'  ? 'Resident' : 'Account';
                    statusEl.innerHTML = '<i class="fas fa-user-circle text-amber-400 mr-2"></i>' +
                        'Last signed in as <b>' + cached.email + '</b> (' + roleLabel + ') \u2014 ' +
                        '<span class="text-slate-400">this public link can\u2019t verify identity. Use the secure link to continue.</span>';
                    if (role === 'COMMITTEE' || role === 'BUILDER') {
                        label.textContent = role === 'COMMITTEE' ? 'Open Committee Dashboard' : 'Open Builder Dashboard';
                        btn.classList.remove('hidden');
                    }
                    signInBtn.classList.remove('hidden');
                    switchBtn.classList.remove('hidden');
                } else {
                    const msg = techConfigured
                        ? 'Not signed in. Click below to sign in with your authorized Google account.'
                        : 'This is a public link. To sign in as committee or builder, use the secure deployment link (ask admin) \u2014 the sign-in button will open Google\u2019s account chooser.';
                    statusEl.innerHTML = '<i class="fab fa-google mr-2 text-amber-400"></i>' + msg;
                    signInBtn.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                statusEl.innerHTML = '<i class="fas fa-times-circle text-red-400 mr-2"></i>Sign-in check failed. Reload to retry.';
                signInBtn.classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
